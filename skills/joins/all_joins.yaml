# ============================================================
# Join: factqualityreport ↔ qualitycutpoints (LEFT)
# ============================================================
join_id: join_fqr_qualitycutpoints
left_table: factqualityreport
left_alias: F
right_table: qualitycutpoints
right_alias: QC
join_type: LEFT
on:
  - left_col: organizationId
    right_col: organizationId
  - left_col: ProductCategoryId
    right_col: ProductCategoryId
  - left_col: domainid
    right_col: domainid
  - left_expression: "SUBSTRING(F.MeasurementYear, 1, 4)"
    right_col: MeasurementYear
  - left_col: submeasurecode
    right_col: SubMeasureCode
    via_table: measuredetails
    via_alias: M
relationship: "many:0..1"
purpose: "Get NCQA percentile cutpoints for ranking"
note: "LEFT JOIN — not all measure+org combinations have cutpoints"
confidence: verified
sql: |
  LEFT JOIN qualitycutpoints QC
    ON QC.organizationId = F.organizationId
    AND QC.ProductCategoryId = F.ProductCategoryId
    AND QC.domainid = F.domainid
    AND SUBSTRING(F.MeasurementYear, 1, 4) = QC.MeasurementYear
    AND QC.SubMeasureCode = M.SubMeasureCode

