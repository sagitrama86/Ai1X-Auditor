# ============================================================
# Join: factqualityreport ↔ dimprovidergroup
# ============================================================
join_id: join_fqr_dimprovidergroup
left_table: factqualityreport
left_alias: F
right_table: dimprovidergroup
right_alias: PG
join_type: INNER
on:
  - left_col: providerGroupID
    right_col: providerGroupID
  - left_col: domainid
    right_col: domainid
relationship: "many:1"
purpose: "Get provider group name"
confidence: verified
sql: |
  INNER JOIN dimprovidergroup PG
    ON F.providerGroupID = PG.providerGroupID
    AND F.domainid = PG.domainid

