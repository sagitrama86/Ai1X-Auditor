# ============================================================
# Join: factqualityreport ↔ dimprovider_RDM (CONCAT)
# ============================================================
join_id: join_fqr_dimprovider_rdm
left_table: factqualityreport
left_alias: F
right_table: dimprovider_RDM
right_alias: PR
join_type: INNER
on_expression: "F.KeyToProvider = CONCAT(PR.domainid, '-', PR.sourcesystemuniqueidentifier)"
relationship: "many:1"
purpose: "Get provider NPI, specialty, details"
note: "Concatenation-based join — KeyToProvider is domainid + '-' + ssui"
confidence: verified
validation:
  sample_values:
    KeyToProvider: ["1042-PAT00123", "1042-PAT00456", "2001-EVT00789"]
    domainid: [1042, 1042, 2001]
    ssui: ["PAT00123", "PAT00456", "EVT00789"]
  match_rate: 1.0
sql: |
  INNER JOIN dimprovider_RDM PR
    ON F.KeyToProvider = CONCAT(PR.domainid, '-', PR.sourcesystemuniqueidentifier)

