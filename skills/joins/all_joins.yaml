# ============================================================
# Join: factqualityreport ↔ measuredetails (conditional)
# ============================================================
join_id: join_fqr_measuredetails
left_table: factqualityreport
left_alias: F
right_table: measuredetails
right_alias: M
join_type: INNER
on_expression: |
  (F.keyvaluemeasureid IS NOT NULL AND F.keyvaluemeasureid = M.measureid)
  OR (F.keyvaluemeasureid IS NULL AND F.clinicalmeasureid = M.clinicalmeasureid)
relationship: "many:1"
purpose: "Get measure name, type, domain, category, flags"
note: "Conditional OR join — keyvaluemeasureid takes precedence, clinicalmeasureid is fallback"
confidence: verified
validation:
  rows_sampled: 50000
  match_rate: 1.0
  keyvaluemeasureid_populated: "86%"
  clinicalmeasureid_fallback: "14%"
sql: |
  INNER JOIN measuredetails M
    ON (F.keyvaluemeasureid IS NOT NULL AND F.keyvaluemeasureid = M.measureid)
    OR (F.keyvaluemeasureid IS NULL AND F.clinicalmeasureid = M.clinicalmeasureid)

