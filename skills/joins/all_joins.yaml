# ============================================================
# Join: factqualityreport ↔ keyvaluemapping (LEFT)
# ============================================================
join_id: join_fqr_keyvaluemapping
left_table: factqualityreport
left_alias: F
right_table: keyvaluemapping
right_alias: KVM
join_type: LEFT
on_expression: |
  KVM.ADDITIONALKEY2 = SUBSTRING(F.MeasurementYear, 1, 4)
  AND KVM.ADDITIONALKEY1 = F.KEYVALUEMEASUREID
  AND KVM.KeyName = F.submeasurecode
  AND KVM.SubModuleName = 'Measure_Merge'
relationship: "many:0..1"
purpose: "Measure merging — maps old measure codes to new ones"
note: "LEFT JOIN — most measures are not merged. Only rows with SubModuleName='Measure_Merge' are relevant."
confidence: verified
sql: |
  LEFT JOIN keyvaluemapping KVM
    ON KVM.ADDITIONALKEY2 = SUBSTRING(F.MeasurementYear, 1, 4)
    AND KVM.ADDITIONALKEY1 = F.KEYVALUEMEASUREID
    AND KVM.KeyName = F.submeasurecode
    AND KVM.SubModuleName = 'Measure_Merge'
