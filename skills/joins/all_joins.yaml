# ============================================================
# Join: factqualityreport ↔ dimorganization
# ============================================================
join_id: join_fqr_dimorg
left_table: factqualityreport
left_alias: F
right_table: dimorganization
right_alias: org
join_type: INNER
on:
  - left_col: organizationid
    right_col: organizationid
relationship: "many:1"
purpose: "Get organization name"
confidence: verified
sql: |
  INNER JOIN dimorganization org
    ON org.organizationid = F.organizationid

