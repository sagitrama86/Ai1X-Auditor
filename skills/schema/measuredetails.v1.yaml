version: 1
table_name: measuredetails
schema: dbo
database: HEDIS_RDW
classification: dimension
description: ''
domain: Quality Reporting
subject_area: HEDIS
row_count_approx: 18
grain:
  description: ''
  columns: &id001
  - measureid
  composite_primary_key: *id001
joins_with:
- table: factqualityreport
  join_type: INNER
  'on': []
  on_expression: '(F.keyvaluemeasureid IS NOT NULL AND F.keyvaluemeasureid = M.measureid)
    OR (F.keyvaluemeasureid IS NULL AND F.clinicalmeasureid = M.clinicalmeasureid)

    '
  relationship: many:1
  purpose: Measure name, type, domain, category, flags
  note: "Conditional join \u2014 keyvaluemeasureid takes precedence"
columns:
  measureid:
    business_name: Measure ID
    semantic_role: identifier
    aggregatable: false
    description: "Unique measure identifier \u2014 primary join key from factqualityreport"
    data_type: INT
    nullable: false
    pk: true
  clinicalmeasureid:
    business_name: Clinical Measure ID
    semantic_role: lookup
    aggregatable: false
    description: Fallback join key to measuredetails when keyvaluemeasureid is NULL
    fk_target: measuredetails.clinicalmeasureid (conditional)
    data_type: INT
    nullable: false
    pk: false
  submeasurecode:
    business_name: Sub-Measure Code
    semantic_role: code
    aggregatable: false
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    format: XXX-NN
    synonyms:
    - measure code
    - measure
    data_type: VARCHAR(20)
    nullable: false
    pk: false
  name:
    business_name: Measure Name
    semantic_role: dimension
    filterable: true
    sortable: true
    groupable: true
    business_rules:
    - 'Used in Measures display: CONCAT(submeasurecode, '' '', name)'
    data_type: VARCHAR(200)
    nullable: false
    pk: false
  measurecode:
    business_name: Measure Code
    semantic_role: code
    filterable: true
    groupable: true
    categorical: true
    description: Parent measure code without sub-measure number (e.g., AWC, CBP)
    data_type: VARCHAR(10)
    nullable: false
    pk: false
  measuretype:
    business_name: Measure Type
    semantic_role: code
    filterable: true
    groupable: true
    categorical: true
    allowed_values:
      Visit: COUNT(visitSSUI)
      Event: COUNT(eventSSUI)
      Patient-Process: COUNT(patientSSUI)
    business_rules:
    - Determines counting entity for VDE/EDE/ECC/ERF
    data_type: VARCHAR(30)
    nullable: false
    pk: false
  STARINDICATOR:
    business_name: Star Indicator
    semantic_role: flag
    categorical: true
    allowed_values:
      Y: Star-rated
      null: Not star-rated
    business_rules:
    - '''Y'' = display with asterisk: ''AWC-01*'''
    data_type: CHAR(1)
    nullable: true
    pk: false
  InverseFlag:
    business_name: Inverse Flag
    semantic_role: flag
    categorical: true
    allowed_values:
      Y: Lower is better
      N: Higher is better
    business_rules:
    - Affects percentile comparison direction. DIFFERENT from NCQAInvertedFlag.
    data_type: CHAR(1)
    nullable: true
    pk: false
  NCQAInvertedFlag:
    business_name: NCQA Inverted Flag
    semantic_role: flag
    categorical: true
    allowed_values:
      Y: Numerator = Non Compliant
      N: Numerator = Compliant
    business_rules:
    - Controls which column is the numerator. DIFFERENT from InverseFlag.
    data_type: CHAR(1)
    nullable: true
    pk: false
  CMQDOMAIN:
    business_name: NCQA Domain
    semantic_role: dimension
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    synonyms:
    - domain
    - NCQA domain
    data_type: VARCHAR(100)
    nullable: true
    pk: false
  category:
    business_name: Health Category
    semantic_role: dimension
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    synonyms:
    - health category
    data_type: VARCHAR(100)
    nullable: true
    pk: false
last_updated: '2026-03-11T13:57:55.941067'
