version: 1.0

table_name: dimorganization
schema: dbo
database: HEDIS_RDW
business_name: Organization
classification: dimension
description: "Organization/client dimension. One row per health plan that reports HEDIS."

domain: Quality Reporting
subject_area: HEDIS
business_purpose: "Maps organizationid to org display name. Used as primary slicer in all reports."
pii_present: false
tags: [hedis, dimension, organization]

row_count_approx: 156

table_intent:
  ai_primary_usage: [lookup]
  typical_filters: [organizationname]
  typical_grouping: [organizationname]
  query_warnings: []
  join_priority_tables: [factqualityreport]
  common_business_questions: ["Which health plans are reporting?"]

grain:
  description: "One row per organizationid"
  columns: [organizationid]
  composite_primary_key: [organizationid]
