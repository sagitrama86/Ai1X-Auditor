version: 1.0

table_name: dimprovider_RDM
schema: dbo
database: HEDIS_RDW
business_name: Provider (RDM)
classification: dimension
description: "Provider Reference Data Management dimension. Individual provider details."

domain: Quality Reporting
subject_area: Provider
business_purpose: "Individual provider details — NPI, specialty, name."
pii_present: true
tags: [hedis, dimension, provider, pii]

row_count_approx: 45892

table_intent:
  ai_primary_usage: [lookup]
  typical_filters: [specialty]
  typical_grouping: [specialty, providerNPI]
  query_warnings:
    - "No single-column FK from factqualityreport — requires CONCAT join"
    - "F.KeyToProvider = CONCAT(PR.domainid, '-', PR.sourcesystemuniqueidentifier)"
  join_priority_tables: [factqualityreport]

grain:
  description: "One row per domainid + sourcesystemuniqueidentifier"
  columns: [domainid, sourcesystemuniqueidentifier]
  composite_primary_key: [domainid, sourcesystemuniqueidentifier]
  uniqueness_guarantee: true

joins_with:
  - table: factqualityreport
    on_expression: "F.KeyToProvider = CONCAT(PR.domainid, '-', PR.sourcesystemuniqueidentifier)"
    relationship: "1:many"
    note: "Concatenation-based join — not a standard FK"

problems_and_suggestions:
  - problem: "No single-column FK from factqualityreport — requires CONCAT join"
    suggestion: "Add a computed column matching KeyToProvider format, or add KeyToProvider to this table"

columns:
  domainid:
    business_name: Domain ID
    description: "Domain/tenant identifier — first part of CONCAT key"
    semantic_role: identifier
    data_type: INT
    nullable: false
    pk: false
    aggregatable: false
    aggregation_behavior: non_additive

  sourcesystemuniqueidentifier:
    business_name: Source System ID
    description: "Provider identifier from source system — second part of CONCAT key"
    semantic_role: identifier
    data_type: VARCHAR(50)
    nullable: false
    pk: false
    aggregatable: false
    aggregation_behavior: non_additive

  providerNPI:
    business_name: Provider NPI
    description: "National Provider Identifier"
    semantic_role: identifier
    synonyms: [NPI]
    data_type: VARCHAR(20)
    nullable: true
    pk: false
    pii: true
    filterable: true
    groupable: true

  specialty:
    business_name: Specialty
    description: "Provider specialty"
    semantic_role: dimension
    data_type: VARCHAR(100)
    nullable: true
    pk: false
    filterable: true
    sortable: true
    groupable: true
    categorical: true

column_relationships:
  - column_a: domainid
    column_b: sourcesystemuniqueidentifier
    relationship_type: derived
    rule: "CONCAT(domainid, '-', sourcesystemuniqueidentifier) = factqualityreport.KeyToProvider"

performance:
  large_table: false

