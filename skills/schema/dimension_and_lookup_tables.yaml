# ============================================================
# Table: dimorganization
# ============================================================
table_name: dimorganization
schema: dbo
classification: dimension
description: "Organization/client dimension. One row per health plan that reports HEDIS."
row_count_approx: 156
grain:
  description: "One row per organizationid"
  columns: [organizationid]
joins_with:
  - table: factqualityreport
    on: [organizationid]
    relationship: "1:many"
problems_and_suggestions: []
columns:
  organizationid:
    data_type: INT
    nullable: false
    pk: true
    fk: null
    grain: "Unique organization identifier"
    record_level_info: "Each org is a separate HEDIS-reporting health plan."
    same_in_other_tables:
      - {table: factqualityreport, column: organizationid}
      - {table: qualitycutpoints, column: organizationId}
  organizationname:
    data_type: VARCHAR(200)
    nullable: false
    pk: false
    fk: null
    grain: "Organization display name"
    record_level_info: "Used as primary slicer in all reports."
    same_in_other_tables:
      - {table: factqualityreport, column: organizationname, relationship: "Denormalized copy"}

