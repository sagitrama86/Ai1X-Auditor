# ============================================================
# Table: keyvaluemapping
# ============================================================
version: 1.0

table_name: keyvaluemapping
schema: dbo
database: HEDIS_RDW
business_name: Key Value Mapping
classification: lookup
description: >
  Lookup table for measure merging and key-value translations. Maps old
  measure codes to new ones via 'Measure_Merge' SubModuleName.

domain: Quality Reporting
subject_area: HEDIS
business_purpose: "Handles NCQA measure merges/renames across years."
pii_present: false
tags: [hedis, lookup, measure-merge]

row_count_approx: 892

table_intent:
  ai_primary_usage: [lookup]
  typical_filters: [SubModuleName]
  typical_grouping: []
  query_warnings:
    - "LEFT JOIN — most measures are not merged"
    - "Filter SubModuleName = 'Measure_Merge' for quality reports"
  join_priority_tables: [factqualityreport]

grain:
  description: "One row per KeyName + ADDITIONALKEY1 + ADDITIONALKEY2 + SubModuleName"
  columns: [KeyName, ADDITIONALKEY1, ADDITIONALKEY2, SubModuleName]
  composite_primary_key: [KeyName, ADDITIONALKEY1, ADDITIONALKEY2, SubModuleName]
  uniqueness_guarantee: true

joins_with:
  - table: factqualityreport
    join_type: LEFT
    on_expression: >
      KVM.ADDITIONALKEY2 = SUBSTRING(F.MeasurementYear, 1, 4)
      AND KVM.ADDITIONALKEY1 = F.KEYVALUEMEASUREID
      AND KVM.KeyName = F.submeasurecode
      AND KVM.SubModuleName = 'Measure_Merge'
    note: "LEFT JOIN — most measures are not merged"

columns:
  KeyName:
    business_name: Key Name
    description: "Original measure code — matches factqualityreport.submeasurecode"
    semantic_role: code
    data_type: VARCHAR(50)
    nullable: false
    pk: true
    aggregatable: false
    same_in_other_tables:
      - {table: factqualityreport, column: submeasurecode}

  KEYVALUE:
    business_name: Key Value
    description: "Mapped/merged measure code — replaces original in display when NOT NULL"
    semantic_role: code
    data_type: VARCHAR(50)
    nullable: true
    pk: false
    aggregatable: false
    business_rules: ["When NOT NULL, replaces submeasurecode in display"]

  ADDITIONALKEY1:
    business_name: Additional Key 1
    description: "Maps to keyvaluemeasureid"
    semantic_role: lookup
    data_type: VARCHAR(50)
    nullable: true
    pk: true
    aggregatable: false

  ADDITIONALKEY2:
    business_name: Additional Key 2
    description: "Maps to measurement year (first 4 chars)"
    semantic_role: lookup
    data_type: VARCHAR(50)
    nullable: true
    pk: true
    aggregatable: false

  SubModuleName:
    business_name: Sub Module Name
    description: "Module name — filter for 'Measure_Merge'"
    semantic_role: code
    data_type: VARCHAR(50)
    nullable: true
    pk: true
    aggregatable: false
    categorical: true
    business_rules: ["Only rows with SubModuleName = 'Measure_Merge' are used in quality reports"]

value_dictionary:
  SubModuleName:
    Measure_Merge: "Quality report measure merging"

performance:
  large_table: false

sample_rows: []
