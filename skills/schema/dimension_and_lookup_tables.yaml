# ============================================================
# Table: qualitycutpoints
# ============================================================
version: 1.0

table_name: qualitycutpoints
schema: dbo
database: HEDIS_RDW
business_name: Quality Cutpoints
classification: lookup
description: >
  NCQA percentile cutpoints for quality measures. Defines thresholds
  for <25th, 25th, 50th, 75th, 90th percentile rankings. Published annually.

domain: Quality Reporting
subject_area: HEDIS
business_purpose: "Percentile ranking of compliance rates against NCQA benchmarks."
pii_present: false
tags: [hedis, lookup, percentile, cutpoints]

row_count_approx: 2340

table_intent:
  ai_primary_usage: [metric_calculation, lookup]
  typical_filters: []
  typical_grouping: []
  query_warnings: ["LEFT JOIN — not all measures have cutpoints"]
  join_priority_tables: [factqualityreport]
  common_business_questions:
    - "What percentile does this measure fall in?"
    - "What are the cutpoint thresholds?"

grain:
  description: "One row per organizationId + ProductCategoryId + domainid + MeasurementYear + SubMeasureCode"
  columns: [organizationId, ProductCategoryId, domainid, MeasurementYear, SubMeasureCode]
  composite_primary_key: [organizationId, ProductCategoryId, domainid, MeasurementYear, SubMeasureCode]
  uniqueness_guarantee: true

joins_with:
  - table: factqualityreport
    join_type: LEFT
    on: [organizationId, ProductCategoryId, domainid, MeasurementYear, SubMeasureCode]
    relationship: "1:many"
    note: "LEFT JOIN — not all measures have cutpoints"

columns:
  organizationId:
    business_name: Organization ID
    semantic_role: identifier
    data_type: INT
    nullable: false
    pk: true
    aggregatable: false

  ProductCategoryId:
    business_name: Product Category ID
    semantic_role: identifier
    data_type: INT
    nullable: false
    pk: true
    aggregatable: false

  domainid:
    business_name: Domain ID
    semantic_role: identifier
    data_type: INT
    nullable: false
    pk: true
    aggregatable: false

  MeasurementYear:
    business_name: Measurement Year
    semantic_role: date
    data_type: VARCHAR(4)
    nullable: false
    pk: true
    aggregatable: false

  SubMeasureCode:
    business_name: Sub-Measure Code
    semantic_role: code
    data_type: VARCHAR(20)
    nullable: false
    pk: true
    aggregatable: false

  Cutpoint3:
    business_name: 25th Percentile Cutpoint
    description: "Compliance % below this = <25th percentile"
    semantic_role: metric
    data_type: DECIMAL(5,2)
    nullable: true
    aggregatable: false
    aggregation_behavior: non_additive
    unit_of_measure: percentage

  Cutpoint5:
    business_name: 50th Percentile Cutpoint
    description: "Between Cutpoint3 and Cutpoint5 = 25th percentile"
    semantic_role: metric
    data_type: DECIMAL(5,2)
    nullable: true
    aggregatable: false
    aggregation_behavior: non_additive
    unit_of_measure: percentage

  Cutpoint7:
    business_name: 75th Percentile Cutpoint
    description: "Between Cutpoint5 and Cutpoint7 = 50th percentile"
    semantic_role: metric
    data_type: DECIMAL(5,2)
    nullable: true
    aggregatable: false
    aggregation_behavior: non_additive
    unit_of_measure: percentage

  Cutpoint8:
    business_name: 90th Percentile Cutpoint
    description: "At or above this = 90th percentile"
    semantic_role: metric
    data_type: DECIMAL(5,2)
    nullable: true
    aggregatable: false
    aggregation_behavior: non_additive
    unit_of_measure: percentage

column_relationships:
  - column_a: Cutpoint3
    column_b: Cutpoint5
    relationship_type: hierarchy
    rule: "Cutpoint3 <= Cutpoint5 <= Cutpoint7 <= Cutpoint8"

performance:
  large_table: false

