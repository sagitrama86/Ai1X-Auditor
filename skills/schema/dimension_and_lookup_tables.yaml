# ============================================================
# Table: qualitycutpoints
# ============================================================
table_name: qualitycutpoints
schema: dbo
classification: lookup
description: >
  NCQA percentile cutpoints for quality measures. Defines the thresholds
  for <25th, 25th, 50th, 75th, 90th percentile rankings. Published by
  NCQA annually. One row per org + product + domain + year + measure.
row_count_approx: 2340
grain:
  description: "One row per organizationId + ProductCategoryId + domainid + MeasurementYear + SubMeasureCode"
  columns: [organizationId, ProductCategoryId, domainid, MeasurementYear, SubMeasureCode]
joins_with:
  - table: factqualityreport
    join_type: LEFT
    on: [organizationId, ProductCategoryId, domainid, MeasurementYear, SubMeasureCode]
    relationship: "1:many"
    note: "LEFT JOIN — not all measures have cutpoints"
columns:
  organizationId: {data_type: INT, nullable: false, grain: "Organization"}
  ProductCategoryId: {data_type: INT, nullable: false, grain: "LOB"}
  domainid: {data_type: INT, nullable: false, grain: "Domain"}
  MeasurementYear: {data_type: VARCHAR(4), nullable: false, grain: "Year"}
  SubMeasureCode: {data_type: VARCHAR(20), nullable: false, grain: "Measure"}
  Cutpoint3:
    data_type: DECIMAL(5,2)
    nullable: true
    grain: "25th percentile threshold"
    record_level_info: "Compliance % below this = <25th percentile"
  Cutpoint5:
    data_type: DECIMAL(5,2)
    nullable: true
    grain: "50th percentile threshold"
    record_level_info: "Compliance % between Cutpoint3 and Cutpoint5 = 25th percentile"
  Cutpoint7:
    data_type: DECIMAL(5,2)
    nullable: true
    grain: "75th percentile threshold"
  Cutpoint8:
    data_type: DECIMAL(5,2)
    nullable: true
    grain: "90th percentile threshold"
    record_level_info: "Compliance % at or above this = 90th percentile"

