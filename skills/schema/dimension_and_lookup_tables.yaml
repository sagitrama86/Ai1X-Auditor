# ============================================================
# Table: keyvaluemapping
# ============================================================
table_name: keyvaluemapping
schema: dbo
classification: lookup
description: >
  Lookup table for measure merging and key-value translations. Used when
  NCQA merges or renames measures across years. Maps old measure codes
  to new ones via the 'Measure_Merge' SubModuleName.
row_count_approx: 892
grain:
  description: "One row per KeyName + ADDITIONALKEY1 + ADDITIONALKEY2 + SubModuleName"
  columns: [KeyName, ADDITIONALKEY1, ADDITIONALKEY2, SubModuleName]
joins_with:
  - table: factqualityreport
    join_type: LEFT
    on_expression: >
      KVM.ADDITIONALKEY2 = SUBSTRING(F.MeasurementYear, 1, 4)
      AND KVM.ADDITIONALKEY1 = F.KEYVALUEMEASUREID
      AND KVM.KeyName = F.submeasurecode
      AND KVM.SubModuleName = 'Measure_Merge'
    note: "LEFT JOIN — most measures are not merged"
columns:
  KeyName:
    data_type: VARCHAR(50)
    nullable: false
    grain: "Original measure code"
    record_level_info: "Matches factqualityreport.submeasurecode"
  KEYVALUE:
    data_type: VARCHAR(50)
    nullable: true
    grain: "Mapped/merged measure code"
    record_level_info: >
      When not NULL, this replaces the original submeasurecode in display.
      The measure name is then looked up from measuredetails using this value.
  ADDITIONALKEY1:
    data_type: VARCHAR(50)
    nullable: true
    grain: "Additional key 1 — maps to keyvaluemeasureid"
  ADDITIONALKEY2:
    data_type: VARCHAR(50)
    nullable: true
    grain: "Additional key 2 — maps to measurement year (first 4 chars)"
  SubModuleName:
    data_type: VARCHAR(50)
    nullable: true
    grain: "Module name — filter for 'Measure_Merge'"
    record_level_info: "Only rows with SubModuleName = 'Measure_Merge' are used in quality reports"
