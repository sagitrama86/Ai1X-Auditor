# ============================================================
# Table: factqualityreport
# Migrated to v1.0 template — 2026-03-09
# ============================================================

version: 1.0

# --- Table Identity ---
table_name: factqualityreport
schema: dbo
database: HEDIS_RDW
business_name: Quality Report Fact
classification: fact
description: >
  Primary fact table for HEDIS quality reporting. Contains one row per member
  per measure per submission per clinical status. Stores performance metrics
  (compliant/non-compliant), exclusion statuses, and clinical processing
  outcomes for each member-measure combination.

# --- Ownership & Governance ---
domain: Quality Reporting
subject_area: HEDIS
business_purpose: >
  Central table for all quality reports — compliance rates, percentile rankings,
  gap-to-target, and clinical status counts are all derived from this table.
data_owner:
data_steward:
pii_present: false
tags: [hedis, quality, compliance, fact]

# --- Volume & Refresh ---
row_count_approx: 4523891
refresh_frequency:
load_strategy:

# --- AI Guidance ---
table_intent:
  ai_primary_usage: [reporting, metric_calculation, analytics]
  typical_filters: [isRaw, isUtilization, MeasurementYear, organizationid]
  typical_grouping: [submeasurecode, NCQA_Submission_ID_Name, organizationname]
  query_warnings:
    - "Always filter isRaw=0 and isUtilization=0"
    - "Always deduplicate with ROW_NUMBER OVER (PARTITION BY factssui, SubmissionId)"
    - "Join to measuredetails is conditional — keyvaluemeasureid takes precedence over clinicalmeasureid"
  join_priority_tables: [factQualityReport_Filters, measuredetails, dimorganization, qualitycutpoints]
  common_business_questions:
    - "What is the compliance rate for a given measure?"
    - "How many members are in the denominator?"
    - "What percentile does this measure fall in?"
    - "How many more compliant members needed to reach 50th percentile?"

# --- Grain ---
grain:
  description: >
    One row per unique combination of factssui + SubmissionId.
    factssui encodes patient + measure + clinical status.
    A single patient can appear multiple times for different measures,
    submissions, and clinical statuses.
  columns: [factssui, SubmissionId]
  composite_primary_key: [factssui, SubmissionId]
  natural_key: []
  surrogate_key: factssui
  uniqueness_guarantee: false
  deduplication_logic: "ROW_NUMBER() OVER (PARTITION BY factssui, SubmissionId ORDER BY factssui, SubmissionId ASC) = 1"

# --- Joins ---
joins_with:
  - table: factQualityReport_Filters
    join_type: INNER
    on: [factssui, SubmissionId]
    relationship: "1:1"
    purpose: "Attribution model details, provider assignments, product/plan info"

  - table: dimorganization
    join_type: INNER
    on: [organizationid]
    relationship: "many:1"
    purpose: "Organization/client name and settings"

  - table: measuredetails
    join_type: INNER
    on_expression: >
      (F.keyvaluemeasureid IS NOT NULL AND F.keyvaluemeasureid = M.measureid)
      OR (F.keyvaluemeasureid IS NULL AND F.clinicalmeasureid = M.clinicalmeasureid)
    relationship: "many:1"
    purpose: "Measure name, type, domain, category, flags"
    note: "Conditional join — keyvaluemeasureid when available, falls back to clinicalmeasureid"

  - table: dimprovidergroup
    join_type: INNER
    on: [providerGroupID, domainid]
    relationship: "many:1"
    purpose: "Provider group name"

  - table: dimprovider_RDM
    join_type: INNER
    on_expression: "F.KeyToProvider = CONCAT(PR.domainid, '-', PR.sourcesystemuniqueidentifier)"
    relationship: "many:1"
    purpose: "Provider details — NPI, specialty, name"
    note: "Concatenation-based join"

  - table: dimproductcategory
    join_type: INNER
    on: [ProductCategoryID]
    relationship: "many:1"
    purpose: "Line of Business name"

  - table: qualitycutpoints
    join_type: LEFT
    on: [organizationId, ProductCategoryId, domainid, MeasurementYear, SubMeasureCode]
    relationship: "many:1"
    purpose: "NCQA percentile cutpoints"
    note: "LEFT JOIN — not all measure+org combinations have cutpoints"

  - table: keyvaluemapping
    join_type: LEFT
    on_expression: >
      KVM.ADDITIONALKEY2 = SUBSTRING(F.MeasurementYear, 1, 4)
      AND KVM.ADDITIONALKEY1 = F.KEYVALUEMEASUREID
      AND KVM.KeyName = F.submeasurecode
      AND KVM.SubModuleName = 'Measure_Merge'
    relationship: "many:0..1"
    purpose: "Measure merging — old codes to new"
    note: "LEFT JOIN — most measures are not merged"

# --- Problems ---
problems_and_suggestions:
  - problem: "KeyToProvider is a concatenated composite key instead of a proper FK"
    impact: "Cannot use standard FK join; requires CONCAT; no referential integrity"
    suggestion: "Add a proper FK column or create a computed column with an index"

  - problem: "clinicalonlystatus uses magic numbers (16, 17, 23, 24) instead of a lookup table"
    impact: "Business logic encoded in application code, not in the database"
    suggestion: "Create a dimclinicalstatus lookup table"

  - problem: "Deduplication required via ROW_NUMBER — indicates potential duplicate rows"
    impact: "Every query must include ROW_NUMBER to avoid double-counting"
    suggestion: "Investigate root cause; add unique constraint if possible"

  - problem: "organizationname is denormalized (exists in both fact and dimorganization)"
    impact: "Risk of inconsistency"
    suggestion: "Remove from fact table; always join to dimorganization"

# ============================================================
# COLUMNS
# ============================================================
columns:

  factssui:
    business_name: Fact SSUI
    description: "Surrogate key — uniquely identifies a member-measure-clinicalstatus combination within a submission"
    semantic_role: identifier
    synonyms: []
    data_type: BIGINT
    nullable: false
    unique: false
    default_value:
    pk: true
    fk:
    index: "Clustered index on (factssui, SubmissionId)"
    aggregatable: false
    default_aggregation:
    aggregation_behavior: non_additive
    filterable: false
    sortable: false
    groupable: true
    categorical: false
    high_cardinality: true
    constraints: "Part of composite PK with SubmissionId"
    valid_range:
    allowed_values: {}
    format:
    unit_of_measure:
    business_rules: []
    data_quality_rules: []
    pii: false
    sensitive: false
    lineage_source: "ETL-generated surrogate key"
    transformation_logic:
    example_values: []
    same_in_other_tables:
      - {table: factQualityReport_Filters, column: factssui, relationship: "1:1 join key"}
    related_columns: []

  SubmissionId:
    business_name: Submission ID
    description: "Identifies which NCQA submission this row belongs to"
    semantic_role: identifier
    synonyms: [submission]
    data_type: INT
    nullable: false
    unique: false
    pk: true
    fk:
    index: "Clustered index on (factssui, SubmissionId)"
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    high_cardinality: false
    constraints: "Part of composite PK with factssui"
    same_in_other_tables:
      - {table: factQualityReport_Filters, column: SubmissionId, relationship: "1:1 join key"}

  organizationid:
    business_name: Organization ID
    description: "Identifies the client/organization (health plan)"
    semantic_role: lookup
    synonyms: [org id, client id]
    data_type: INT
    nullable: false
    pk: false
    fk: "dimorganization.organizationid"
    index: "Non-clustered index"
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    sortable: false
    groupable: true
    categorical: true
    high_cardinality: false
    same_in_other_tables:
      - {table: dimorganization, column: organizationid, relationship: "PK in dimorganization"}
      - {table: qualitycutpoints, column: organizationId, relationship: "Part of composite key"}

  organizationname:
    business_name: Organization Name
    description: "Denormalized org name — same as dimorganization.organizationname"
    semantic_role: dimension
    synonyms: [org name, client name, health plan]
    data_type: VARCHAR(200)
    nullable: false
    pk: false
    fk:
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    high_cardinality: false
    business_rules: ["Should always match dimorganization.organizationname"]
    same_in_other_tables:
      - {table: dimorganization, column: organizationname, relationship: "Denormalized copy"}

  clinicalmeasureid:
    business_name: Clinical Measure ID
    description: "Fallback join key to measuredetails when keyvaluemeasureid is NULL"
    semantic_role: lookup
    data_type: INT
    nullable: true
    pk: false
    fk: "measuredetails.clinicalmeasureid (conditional)"
    index: "Non-clustered index"
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: false
    groupable: false
    same_in_other_tables:
      - {table: measuredetails, column: clinicalmeasureid, relationship: "Conditional FK — fallback"}

  keyvaluemeasureid:
    business_name: Key Value Measure ID
    description: "Primary join key to measuredetails. When NOT NULL, takes precedence over clinicalmeasureid"
    semantic_role: lookup
    data_type: INT
    nullable: true
    pk: false
    fk: "measuredetails.measureid (conditional)"
    index: "Non-clustered index"
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: false
    groupable: false
    business_rules: ["~86% of rows have this populated"]
    same_in_other_tables:
      - {table: measuredetails, column: measureid, relationship: "Conditional FK — primary path"}

  submeasurecode:
    business_name: Sub-Measure Code
    description: "HEDIS sub-measure code (e.g., AWC-01, CBP-01)"
    semantic_role: code
    synonyms: [measure code, measure]
    data_type: VARCHAR(20)
    nullable: false
    pk: false
    index: "Non-clustered index"
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    high_cardinality: false
    format: "XXX-NN"
    same_in_other_tables:
      - {table: measuredetails, column: submeasurecode}
      - {table: qualitycutpoints, column: SubMeasureCode}

  Act_Performance_Met:
    business_name: Compliant
    description: "1 = member met performance criteria (compliant), 0 = did not"
    semantic_role: measure
    synonyms: [compliant, numerator, performance met]
    data_type: INT
    nullable: false
    pk: false
    aggregatable: true
    default_aggregation: SUM
    aggregation_behavior: additive
    filterable: false
    sortable: false
    groupable: false
    categorical: false
    constraints: "Values: 0 or 1"
    valid_range: "0|1"
    allowed_values: {0: "Not Met", 1: "Met"}
    unit_of_measure: count
    business_rules:
      - "SUM gives total compliant count"
      - "Numerator for non-inverted measures"
      - "For inverted measures (NCQAInvertedFlag='Y'), use Act_Performance_Not_Met instead"
      - "Act_Performance_Met + Act_Performance_Not_Met = 1 for every DE row"
    related_columns:
      - {column: Act_Performance_Not_Met, relationship_type: validation, rule: "Met + Not_Met = 1 for DE rows"}

  Act_Performance_Not_Met:
    business_name: Non Compliant
    description: "1 = member did NOT meet criteria (non-compliant), 0 = met"
    semantic_role: measure
    synonyms: [non compliant, non-compliant]
    data_type: INT
    nullable: false
    pk: false
    aggregatable: true
    default_aggregation: SUM
    aggregation_behavior: additive
    constraints: "Values: 0 or 1"
    valid_range: "0|1"
    allowed_values: {0: "Met", 1: "Not Met"}
    unit_of_measure: count
    business_rules:
      - "SUM gives total non-compliant count"
      - "Numerator for inverted measures (NCQAInvertedFlag='Y')"
    related_columns:
      - {column: Act_Performance_Met, relationship_type: validation, rule: "Met + Not_Met = 1 for DE rows"}

  reportingExclusionStatus:
    business_name: Required Exclusion
    description: "1 = member has a required exclusion, 0 = no exclusion"
    semantic_role: measure
    synonyms: [exclusion, required exclusion]
    data_type: INT
    nullable: false
    pk: false
    aggregatable: true
    default_aggregation: SUM
    aggregation_behavior: additive
    constraints: "Values: 0 or 1"
    valid_range: "0|1"
    allowed_values: {0: "No Exclusion", 1: "Excluded"}
    unit_of_measure: count
    business_rules:
      - "Members with exclusion should NOT be counted in Compliant or Non Compliant"

  clinicalonlystatus:
    business_name: Clinical Status
    description: "Clinical processing status of this member-measure row"
    semantic_role: status
    synonyms: [clinical status, status code]
    data_type: INT
    nullable: false
    pk: false
    index: "Non-clustered index"
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    sortable: false
    groupable: true
    categorical: true
    high_cardinality: false
    constraints: "Values: 16, 17, 23, 24 (and possibly others)"
    business_rules:
      - "Only status=17 (DE) rows contribute to Compliant/Non Compliant counts"
      - "Count is done per entity type based on measuredetails.measuretype"

  patientSSUI:
    business_name: Patient SSUI
    description: "Unique patient identifier — used for COUNT when measuretype = 'Patient-Process'"
    semantic_role: identifier
    data_type: VARCHAR(50)
    nullable: true
    pk: false
    aggregatable: true
    default_aggregation: COUNT
    aggregation_behavior: non_additive
    business_rules: ["NULL when entity type is not patient"]

  visitSSUI:
    business_name: Visit SSUI
    description: "Unique visit identifier — used for COUNT when measuretype = 'Visit'"
    semantic_role: identifier
    data_type: VARCHAR(50)
    nullable: true
    pk: false
    aggregatable: true
    default_aggregation: COUNT
    aggregation_behavior: non_additive
    business_rules: ["NULL when entity type is not visit"]

  eventSSUI:
    business_name: Event SSUI
    description: "Unique event identifier — used for COUNT when measuretype = 'Event'"
    semantic_role: identifier
    data_type: VARCHAR(50)
    nullable: true
    pk: false
    aggregatable: true
    default_aggregation: COUNT
    aggregation_behavior: non_additive
    business_rules: ["NULL when entity type is not event"]

  isRaw:
    business_name: Is Raw
    description: "Whether this is raw (unaudited) data"
    semantic_role: flag
    data_type: BIT
    nullable: false
    pk: false
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    groupable: false
    categorical: true
    constraints: "Values: 0 or 1"
    allowed_values: {0: "Final/audited — include", 1: "Raw/preliminary — EXCLUDE"}
    business_rules: ["Standard fixed filter: WHERE isRaw = 0"]

  isUtilization:
    business_name: Is Utilization
    description: "Whether this is a utilization measure"
    semantic_role: flag
    data_type: BIT
    nullable: false
    pk: false
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    groupable: false
    categorical: true
    constraints: "Values: 0 or 1"
    allowed_values: {0: "Quality measure — include", 1: "Utilization — EXCLUDE"}
    business_rules: ["Standard fixed filter: WHERE isUtilization = 0"]

  enrollmentStatus:
    business_name: Enrollment Status
    description: "Member enrollment status at time of measurement"
    semantic_role: dimension
    synonyms: [enrollment]
    data_type: VARCHAR(20)
    nullable: false
    pk: false
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    high_cardinality: false

  NCQA_Submission_ID_Name:
    business_name: Submission
    description: "Human-readable submission identifier (e.g., 'Submission 1')"
    semantic_role: dimension
    synonyms: [submission, submission name]
    data_type: VARCHAR(100)
    nullable: false
    pk: false
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    high_cardinality: false

  MeasurementYear:
    business_name: Measurement Year
    description: "HEDIS measurement year"
    semantic_role: date
    synonyms: [year, reporting year]
    data_type: VARCHAR(10)
    nullable: false
    pk: false
    index: "Non-clustered index"
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    high_cardinality: false
    format: "YYYY or YYYY-YYYY"
    business_rules: ["SUBSTRING(MeasurementYear, 1, 4) extracts 4-digit year for joins"]
    same_in_other_tables:
      - {table: qualitycutpoints, column: MeasurementYear, relationship: "Join key (first 4 chars)"}

  initiativeyear:
    business_name: Initiative Year
    description: "Initiative/reporting year — may differ from MeasurementYear"
    semantic_role: date
    data_type: VARCHAR(4)
    nullable: false
    pk: false
    filterable: true
    groupable: true
    categorical: true

  providerGroupID:
    business_name: Provider Group ID
    description: "Provider group this member is attributed to"
    semantic_role: lookup
    data_type: INT
    nullable: false
    pk: false
    fk: "dimprovidergroup.providerGroupID"
    index: "Non-clustered index"
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    groupable: true
    business_rules: ["Join also requires domainid for uniqueness"]
    same_in_other_tables:
      - {table: dimprovidergroup, column: providerGroupID, relationship: "PK (with domainid)"}

  KeyToProvider:
    business_name: Key To Provider
    description: "Composite key to provider dimension — NOT a standard FK"
    semantic_role: lookup
    data_type: VARCHAR(50)
    nullable: false
    pk: false
    fk: "CONCAT(dimprovider_RDM.domainid, '-', dimprovider_RDM.sourcesystemuniqueidentifier)"
    index: "Non-clustered index"
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: false
    groupable: false
    constraints: "Format: {domainid}-{sourcesystemuniqueidentifier}"
    format: "{domainid}-{ssui}"
    example_values: ["1042-PAT00123", "2001-EVT00789"]
    same_in_other_tables:
      - {table: dimprovider_RDM, column: "CONCAT(domainid, '-', sourcesystemuniqueidentifier)", relationship: "Concatenation-based join"}

  ProductCategoryID:
    business_name: Product Category ID
    description: "Line of Business identifier"
    semantic_role: lookup
    data_type: INT
    nullable: false
    pk: false
    fk: "dimproductcategory.ProductCategoryID"
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    groupable: true
    categorical: true
    same_in_other_tables:
      - {table: dimproductcategory, column: ProductCategoryID, relationship: "PK"}
      - {table: qualitycutpoints, column: ProductCategoryId, relationship: "Part of composite key"}

  domainid:
    business_name: Domain ID
    description: "Domain/tenant identifier"
    semantic_role: identifier
    data_type: INT
    nullable: false
    pk: false
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    groupable: true
    same_in_other_tables:
      - {table: dimprovidergroup, column: domainid, relationship: "Part of composite join key"}
      - {table: qualitycutpoints, column: domainid, relationship: "Part of composite key"}

  minimumrequiredsamplesize:
    business_name: MRSS
    description: "Minimum Required Sample Size — only for hybrid measures"
    semantic_role: measure
    synonyms: [MRSS, sample size]
    data_type: INT
    nullable: true
    pk: false
    aggregatable: false
    aggregation_behavior: non_additive
    business_rules: ["NULL for administrative-only measures; display as '-' when NULL"]

  submissionsourcesfeedtype:
    business_name: Source Feed Type
    description: "Data source feed type for IDSS reporting (e.g., Administrative, Supplemental)"
    semantic_role: dimension
    synonyms: [source feed, feed type]
    data_type: VARCHAR(50)
    nullable: true
    pk: false
    filterable: true
    groupable: true
    categorical: true

  oversample:
    business_name: Oversample
    description: "Whether this row is from an oversampled population"
    semantic_role: flag
    data_type: VARCHAR(10)
    nullable: true
    pk: false
    filterable: true
    categorical: true

# ============================================================
# VALUE DICTIONARY
# ============================================================
value_dictionary:
  clinicalonlystatus:
    16: "DVDE — Denominator Valid Data Error"
    17: "DE — Denominator Eligible"
    23: "ECC — Exclusion Clinical Code"
    24: "ERF — Exclusion Required Field"
  isRaw:
    0: "Final/audited data"
    1: "Raw/preliminary data"
  isUtilization:
    0: "Quality measure"
    1: "Utilization measure"
  Act_Performance_Met:
    0: "Not Met"
    1: "Met"

# ============================================================
# COLUMN RELATIONSHIPS
# ============================================================
column_relationships:
  - column_a: Act_Performance_Met
    column_b: Act_Performance_Not_Met
    relationship_type: validation
    rule: "Met + Not_Met = 1 for all DE (status=17) rows"

  - column_a: clinicalonlystatus
    column_b: Act_Performance_Met
    relationship_type: dependency
    rule: "Only status=17 rows contribute to compliance counts"

  - column_a: keyvaluemeasureid
    column_b: clinicalmeasureid
    relationship_type: dependency
    rule: "keyvaluemeasureid takes precedence; clinicalmeasureid is fallback when NULL"

# ============================================================
# DERIVED COLUMNS
# ============================================================
derived_columns:
  - name: Measures
    description: "Display name combining measure code and name"
    formula: "CONCAT(M.submeasurecode, ' ', M.name)"
    depends_on: [submeasurecode, measuredetails.name]

  - name: "Compliance %"
    description: "Compliance rate as percentage"
    formula: >
      CASE WHEN NCQAInvertedFlag='Y'
        THEN ROUND(SUM(Act_Performance_Not_Met) * 100.0 / NULLIF(SUM(Act_Performance_Met) + SUM(Act_Performance_Not_Met), 0), 2)
        ELSE ROUND(SUM(Act_Performance_Met) * 100.0 / NULLIF(SUM(Act_Performance_Met) + SUM(Act_Performance_Not_Met), 0), 2)
      END
    depends_on: [Act_Performance_Met, Act_Performance_Not_Met, measuredetails.NCQAInvertedFlag]

  - name: RN
    description: "Row number for deduplication"
    formula: "ROW_NUMBER() OVER (PARTITION BY factssui, SubmissionId ORDER BY factssui, SubmissionId ASC)"
    depends_on: [factssui, SubmissionId]

# ============================================================
# TIME DIMENSIONS
# ============================================================
time_dimensions:
  MeasurementYear:
    type: reporting_year
    hierarchy: [year]

# ============================================================
# PERFORMANCE
# ============================================================
performance:
  large_table: true
  recommended_filters: [isRaw, isUtilization, organizationid, MeasurementYear]
  partition_strategy:
    column: MeasurementYear
  clustering_columns: [organizationid, submeasurecode]

# ============================================================
# SECURITY
# ============================================================
security:
  row_level_security:
    enabled: false
    column:
  masking_rules: {}

# ============================================================
# SAMPLE ROWS
# ============================================================
sample_rows: []
