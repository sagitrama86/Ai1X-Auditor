version: 1.0
table_name: factqualityreport
schema: dbo
database: HEDIS_RDW
classification: fact
description: ''
domain: Quality Reporting
subject_area: HEDIS
row_count_approx: 2993
grain:
  description: ''
  columns: &id001
  - factssui
  - SubmissionId
  composite_primary_key: *id001
joins_with:
- table: factQualityReport_Filters
  join_type: INNER
  'on': []
  on_expression: ''
  relationship: '1:1'
  purpose: Attribution model details, provider assignments, product/plan info
  note: ''
- table: dimorganization
  join_type: INNER
  'on': []
  on_expression: ''
  relationship: many:1
  purpose: Organization/client name
  note: ''
- table: measuredetails
  join_type: INNER
  'on': []
  on_expression: '(F.keyvaluemeasureid IS NOT NULL AND F.keyvaluemeasureid = M.measureid)
    OR (F.keyvaluemeasureid IS NULL AND F.clinicalmeasureid = M.clinicalmeasureid)

    '
  relationship: many:1
  purpose: Measure name, type, domain, category, flags
  note: "Conditional join \u2014 keyvaluemeasureid takes precedence"
- table: dimprovidergroup
  join_type: INNER
  'on': []
  on_expression: ''
  relationship: many:1
  purpose: Provider group name
  note: ''
- table: dimprovider_RDM
  join_type: INNER
  'on': []
  on_expression: F.KeyToProvider = CONCAT(PR.domainid, '-', PR.sourcesystemuniqueidentifier)
  relationship: many:1
  purpose: "Provider details \u2014 NPI, specialty, name"
  note: "Concatenation-based join \u2014 not a standard FK"
- table: dimproductcategory
  join_type: INNER
  'on': []
  on_expression: ''
  relationship: many:1
  purpose: Line of Business name
  note: ''
- table: qualitycutpoints
  join_type: LEFT
  'on': []
  on_expression: ''
  relationship: many:1
  purpose: NCQA percentile cutpoints for ranking
  note: "LEFT JOIN \u2014 not all measure+org combinations have cutpoints"
- table: keyvaluemapping
  join_type: LEFT
  'on': []
  on_expression: 'KVM.ADDITIONALKEY2 = SUBSTRING(F.MeasurementYear, 1, 4) AND KVM.ADDITIONALKEY1
    = F.KEYVALUEMEASUREID AND KVM.KeyName = F.submeasurecode AND KVM.SubModuleName
    = ''Measure_Merge''

    '
  relationship: many:0..1
  purpose: "Measure merging \u2014 old codes to new"
  note: "LEFT JOIN \u2014 most measures are not merged"
columns:
  factssui:
    business_name: Fact SSUI
    semantic_role: identifier
    aggregatable: false
    aggregation_behavior: non_additive
    description: "Surrogate key \u2014 uniquely identifies a member-measure-clinicalstatus\
      \ combination"
    data_type: BIGINT
    nullable: false
    pk: true
  SubmissionId:
    business_name: Submission ID
    semantic_role: identifier
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    groupable: true
    categorical: true
    data_type: INT
    nullable: false
    pk: true
  organizationid:
    business_name: Organization ID
    semantic_role: lookup
    aggregatable: false
    fk_target: dimorganization.organizationid
    data_type: INT
    nullable: false
    pk: false
  organizationname:
    business_name: Organization Name
    semantic_role: dimension
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    synonyms:
    - org name
    - client
    - health plan
    data_type: VARCHAR(200)
    nullable: false
    pk: false
  clinicalmeasureid:
    business_name: Clinical Measure ID
    semantic_role: lookup
    aggregatable: false
    description: Fallback join key to measuredetails when keyvaluemeasureid is NULL
    fk_target: measuredetails.clinicalmeasureid (conditional)
    data_type: INT
    nullable: true
    pk: false
  keyvaluemeasureid:
    business_name: Key Value Measure ID
    semantic_role: lookup
    aggregatable: false
    description: Primary join key to measuredetails. Takes precedence over clinicalmeasureid.
    fk_target: measuredetails.measureid (conditional)
    data_type: INT
    nullable: true
    pk: false
  submeasurecode:
    business_name: Sub-Measure Code
    semantic_role: code
    aggregatable: false
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    format: XXX-NN
    synonyms:
    - measure code
    - measure
    data_type: VARCHAR(20)
    nullable: false
    pk: false
  Act_Performance_Met:
    business_name: Compliant
    semantic_role: measure
    aggregatable: true
    default_aggregation: SUM
    aggregation_behavior: additive
    valid_range: 0|1
    allowed_values:
      0: Not Met
      1: Met
    business_rules:
    - Numerator for non-inverted measures (NCQAInvertedFlag != 'Y')
    - SUM gives total compliant count
    - Act_Performance_Met + Act_Performance_Not_Met = 1 for every DE row
    synonyms:
    - compliant
    - numerator
    - performance met
    data_type: INT
    nullable: false
    pk: false
  Act_Performance_Not_Met:
    business_name: Non Compliant
    semantic_role: measure
    aggregatable: true
    default_aggregation: SUM
    aggregation_behavior: additive
    valid_range: 0|1
    allowed_values:
      0: Met
      1: Not Met
    business_rules:
    - Numerator for inverted measures (NCQAInvertedFlag = 'Y')
    - SUM gives total non-compliant count
    synonyms:
    - non compliant
    - non-compliant
    data_type: INT
    nullable: false
    pk: false
  reportingExclusionStatus:
    business_name: Required Exclusion
    semantic_role: measure
    aggregatable: true
    default_aggregation: SUM
    aggregation_behavior: additive
    valid_range: 0|1
    allowed_values:
      0: No Exclusion
      1: Excluded
    business_rules:
    - Members with exclusion should NOT be counted in Compliant or Non Compliant
    synonyms:
    - exclusion
    - required exclusion
    data_type: INT
    nullable: false
    pk: false
  clinicalonlystatus:
    business_name: Clinical Status
    semantic_role: status
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    groupable: true
    categorical: true
    allowed_values:
      16: "DVDE \u2014 Denominator Valid Data Error"
      17: "DE \u2014 Denominator Eligible"
      23: "ECC \u2014 Exclusion Clinical Code"
      24: "ERF \u2014 Exclusion Required Field"
    business_rules:
    - Only status=17 (DE) rows contribute to Compliant/Non Compliant counts
    - Count is done per entity type based on measuredetails.measuretype
    synonyms:
    - clinical status
    - status code
    data_type: INT
    nullable: false
    pk: false
  patientSSUI:
    business_name: Patient SSUI
    semantic_role: identifier
    aggregatable: true
    default_aggregation: COUNT
    aggregation_behavior: non_additive
    description: Used for COUNT when measuretype = 'Patient-Process'. NULL otherwise.
    data_type: VARCHAR(50)
    nullable: true
    pk: false
  visitSSUI:
    business_name: Visit SSUI
    semantic_role: identifier
    aggregatable: true
    default_aggregation: COUNT
    aggregation_behavior: non_additive
    description: Used for COUNT when measuretype = 'Visit'. NULL otherwise.
    data_type: VARCHAR(50)
    nullable: true
    pk: false
  eventSSUI:
    business_name: Event SSUI
    semantic_role: identifier
    aggregatable: true
    default_aggregation: COUNT
    aggregation_behavior: non_additive
    description: Used for COUNT when measuretype = 'Event'. NULL otherwise.
    data_type: VARCHAR(50)
    nullable: true
    pk: false
  isRau:
    business_name: Is RAU
    semantic_role: flag
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    categorical: true
    allowed_values:
      0: "Not RAU \u2014 include in quality reports"
      1: "RAU \u2014 EXCLUDE"
    business_rules:
    - 'Standard fixed filter: WHERE isRau = 0'
    data_type: TINYINT(1)
    nullable: false
    pk: false
  isUtilization:
    business_name: Is Utilization
    semantic_role: flag
    aggregatable: false
    aggregation_behavior: non_additive
    filterable: true
    categorical: true
    allowed_values:
      0: "Quality measure \u2014 include"
      1: "Utilization \u2014 EXCLUDE"
    business_rules:
    - 'Standard fixed filter: WHERE isUtilization = 0'
    data_type: TINYINT(1)
    nullable: false
    pk: false
  enrollmentStatus:
    business_name: Enrollment Status
    semantic_role: dimension
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    synonyms:
    - enrollment
    data_type: VARCHAR(20)
    nullable: false
    pk: false
  NCQA_Submission_ID_Name:
    business_name: Submission
    semantic_role: dimension
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    synonyms:
    - submission
    - submission name
    data_type: VARCHAR(100)
    nullable: false
    pk: false
  MeasurementYear:
    business_name: Measurement Year
    semantic_role: date
    filterable: true
    sortable: true
    groupable: true
    categorical: true
    format: YYYY or YYYY-YYYY
    business_rules:
    - SUBSTRING(MeasurementYear, 1, 4) extracts 4-digit year for joins
    synonyms:
    - year
    - reporting year
    data_type: VARCHAR(10)
    nullable: false
    pk: false
  initiativeyear:
    business_name: Initiative Year
    semantic_role: date
    filterable: true
    groupable: true
    categorical: true
    data_type: VARCHAR(4)
    nullable: false
    pk: false
  providerGroupID:
    business_name: Provider Group ID
    semantic_role: lookup
    aggregatable: false
    fk_target: dimprovidergroup.providerGroupID
    business_rules:
    - Join also requires domainid for uniqueness
    data_type: INT
    nullable: false
    pk: false
  KeyToProvider:
    business_name: Key To Provider
    semantic_role: lookup
    aggregatable: false
    description: "Composite key to provider dimension \u2014 NOT a standard FK"
    format: '{domainid}-{sourcesystemuniqueidentifier}'
    business_rules:
    - 'Join: F.KeyToProvider = CONCAT(PR.domainid, ''-'', PR.sourcesystemuniqueidentifier)'
    data_type: VARCHAR(50)
    nullable: false
    pk: false
  ProductCategoryID:
    business_name: Product Category ID
    semantic_role: lookup
    aggregatable: false
    fk_target: dimproductcategory.ProductCategoryID
    data_type: INT
    nullable: false
    pk: false
  domainid:
    business_name: Domain ID
    semantic_role: identifier
    aggregatable: false
    data_type: INT
    nullable: false
    pk: false
  minimumrequiredsamplesize:
    business_name: MRSS
    semantic_role: measure
    aggregatable: false
    aggregation_behavior: non_additive
    business_rules:
    - NULL for administrative-only measures; display as '-' when NULL
    synonyms:
    - MRSS
    - sample size
    data_type: INT
    nullable: true
    pk: false
  submissionsourcesfeedtype:
    business_name: Source Feed Type
    semantic_role: dimension
    filterable: true
    groupable: true
    categorical: true
    synonyms:
    - source feed
    - feed type
    data_type: VARCHAR(50)
    nullable: true
    pk: false
  oversample:
    business_name: Oversample
    semantic_role: flag
    filterable: true
    categorical: true
    data_type: VARCHAR(10)
    nullable: true
    pk: false
