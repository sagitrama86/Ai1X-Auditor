# ============================================================
# Table: factqualityreport
# Auto-discovered + SME-enhanced
# Last updated: 2026-03-03
# ============================================================

table_name: factqualityreport
schema: dbo
classification: fact

description: >
  Primary fact table for HEDIS quality reporting. Contains one row per member
  per measure per submission per clinical status. This is the central table
  that all quality reports are built from. Stores performance metrics
  (compliant/non-compliant), exclusion statuses, and clinical processing
  outcomes for each member-measure combination.

row_count_approx: 4523891

grain:
  description: >
    One row per unique combination of factssui + SubmissionId.
    factssui itself encodes patient + measure + clinical status.
    A single patient can appear multiple times for different measures,
    different submissions, and different clinical statuses.
  columns: [factssui, SubmissionId]

joins_with:
  - table: factQualityReport_Filters
    join_type: INNER
    on: [factssui, SubmissionId]
    relationship: "1:1 — every row in factqualityreport has exactly one matching row in Filters"
    purpose: "Filters table holds attribution model details, provider assignments, product/plan info"

  - table: dimorganization
    join_type: INNER
    on: [organizationid]
    relationship: "many:1"
    purpose: "Get organization/client name and settings"

  - table: measuredetails
    join_type: INNER
    on_expression: >
      (F.keyvaluemeasureid IS NOT NULL AND F.keyvaluemeasureid = M.measureid)
      OR (F.keyvaluemeasureid IS NULL AND F.clinicalmeasureid = M.clinicalmeasureid)
    relationship: "many:1"
    purpose: "Get measure name, type, domain, category, flags"
    note: "Conditional join — uses keyvaluemeasureid when available, falls back to clinicalmeasureid"

  - table: dimprovidergroup
    join_type: INNER
    on: [providerGroupID, domainid]
    relationship: "many:1"
    purpose: "Get provider group name"

  - table: dimprovider_RDM
    join_type: INNER
    on_expression: "F.KeyToProvider = CONCAT(PR.domainid, '-', PR.sourcesystemuniqueidentifier)"
    relationship: "many:1"
    purpose: "Get provider details — NPI, specialty, name"
    note: "Concatenation-based join. KeyToProvider is a composite string."

  - table: dimproductcategory
    join_type: INNER
    on: [ProductCategoryID]
    relationship: "many:1"
    purpose: "Get Line of Business name (Commercial, Medicaid, Medicare)"

  - table: qualitycutpoints
    join_type: LEFT
    on: [organizationId, ProductCategoryId, domainid, MeasurementYear, SubMeasureCode]
    relationship: "many:1"
    purpose: "Get NCQA percentile cutpoints for ranking"
    note: "LEFT JOIN because not all measure+org combinations have cutpoints"

  - table: keyvaluemapping
    join_type: LEFT
    on_expression: >
      KVM.ADDITIONALKEY2 = SUBSTRING(F.MeasurementYear, 1, 4)
      AND KVM.ADDITIONALKEY1 = F.KEYVALUEMEASUREID
      AND KVM.KeyName = F.submeasurecode
      AND KVM.SubModuleName = 'Measure_Merge'
    relationship: "many:0..1"
    purpose: "Measure merging — maps old measure codes to new ones"
    note: "LEFT JOIN because most measures are not merged"

problems_and_suggestions:
  - problem: "KeyToProvider is a concatenated composite key (domainid + '-' + ssui) instead of a proper FK"
    impact: "Cannot use standard FK join; requires CONCAT in join condition; no referential integrity enforced"
    suggestion: "Add a proper FK column or create a computed column with an index"

  - problem: "clinicalonlystatus uses magic numbers (16, 17, 23, 24) instead of a lookup table"
    impact: "Business logic is encoded in application code, not in the database"
    suggestion: "Create a dimclinicalstatus lookup table"

  - problem: "Deduplication required via ROW_NUMBER — indicates potential duplicate rows"
    impact: "Every query must include ROW_NUMBER PARTITION BY factssui, SubmissionId to avoid double-counting"
    suggestion: "Investigate root cause of duplicates; add unique constraint if possible"

  - problem: "organizationname is denormalized (exists in both fact table and dimorganization)"
    impact: "Risk of inconsistency between fact and dimension"
    suggestion: "Remove from fact table; always join to dimorganization for org name"

# ============================================================
# COLUMNS
# ============================================================
columns:

  # --- Primary Keys ---
  factssui:
    data_type: BIGINT
    nullable: false
    pk: true
    fk: null
    constraints: "Part of composite PK with SubmissionId"
    index: "Clustered index on (factssui, SubmissionId)"
    grain: "Encodes a unique member + measure + clinical status combination"
    record_level_info: >
      Surrogate key generated by the ETL process. Uniquely identifies a
      member-measure-clinicalstatus combination within a submission.
      Same factssui appears in factQualityReport_Filters with 1:1 mapping.
    same_in_other_tables:
      - table: factQualityReport_Filters
        column: factssui
        relationship: "1:1 join key"

  SubmissionId:
    data_type: INT
    nullable: false
    pk: true
    fk: null
    constraints: "Part of composite PK with factssui"
    index: "Clustered index on (factssui, SubmissionId)"
    grain: "Identifies which NCQA submission this row belongs to"
    record_level_info: >
      A client can have multiple submissions (e.g., Submission 1, Submission 2).
      Each submission is a separate data submission to NCQA.
    same_in_other_tables:
      - table: factQualityReport_Filters
        column: SubmissionId
        relationship: "1:1 join key"

  # --- Organization ---
  organizationid:
    data_type: INT
    nullable: false
    pk: false
    fk: "dimorganization.organizationid"
    constraints: null
    index: "Non-clustered index"
    grain: "Identifies the client/organization"
    record_level_info: >
      Each organization is a separate HEDIS-reporting entity (health plan).
      All rows for one org share the same organizationid.
    same_in_other_tables:
      - table: dimorganization
        column: organizationid
        relationship: "PK in dimorganization"
      - table: qualitycutpoints
        column: organizationId
        relationship: "Part of composite key in cutpoints"

  organizationname:
    data_type: VARCHAR(200)
    nullable: false
    pk: false
    fk: null
    constraints: null
    index: null
    grain: "Denormalized org name — same as dimorganization.organizationname"
    record_level_info: >
      Denormalized for query convenience. Should always match
      dimorganization.organizationname for the same organizationid.
      Used as a slicer in Power BI reports.
    same_in_other_tables:
      - table: dimorganization
        column: organizationname
        relationship: "Denormalized copy"

  # --- Measure Identification ---
  clinicalmeasureid:
    data_type: INT
    nullable: true
    pk: false
    fk: "measuredetails.clinicalmeasureid (conditional)"
    constraints: null
    index: "Non-clustered index"
    grain: "Identifies the clinical measure"
    record_level_info: >
      Used as fallback join key to measuredetails when keyvaluemeasureid is NULL.
      When keyvaluemeasureid IS NOT NULL, that takes precedence.
    same_in_other_tables:
      - table: measuredetails
        column: clinicalmeasureid
        relationship: "Conditional FK — used when keyvaluemeasureid is NULL"

  keyvaluemeasureid:
    data_type: INT
    nullable: true
    pk: false
    fk: "measuredetails.measureid (conditional)"
    constraints: null
    index: "Non-clustered index"
    grain: "Identifies the measure via key-value mapping"
    record_level_info: >
      Primary join key to measuredetails. When NOT NULL, join on
      keyvaluemeasureid = measuredetails.measureid. When NULL,
      fall back to clinicalmeasureid. ~86% of rows have this populated.
    same_in_other_tables:
      - table: measuredetails
        column: measureid
        relationship: "Conditional FK — primary path"

  submeasurecode:
    data_type: VARCHAR(20)
    nullable: false
    pk: false
    fk: null
    constraints: null
    index: "Non-clustered index"
    grain: "HEDIS sub-measure code (e.g., AWC-01, CBP-01)"
    record_level_info: >
      The specific HEDIS sub-measure this row is for. Format: XXX-NN
      where XXX is the measure code and NN is the sub-measure number.
      Used as a slicer and in GROUP BY for most reports.
    same_in_other_tables:
      - table: measuredetails
        column: submeasurecode
        relationship: "Matches for measure lookup"
      - table: qualitycutpoints
        column: SubMeasureCode
        relationship: "Used in cutpoint lookup"

  # --- Performance Metrics ---
  Act_Performance_Met:
    data_type: INT
    nullable: false
    pk: false
    fk: null
    constraints: "Values: 0 or 1"
    index: null
    grain: "1 = member met performance criteria (compliant), 0 = did not"
    record_level_info: >
      Binary flag. SUM across rows gives total compliant count.
      This is the NUMERATOR for non-inverted measures.
      For inverted measures (NCQAInvertedFlag='Y'), Act_Performance_Not_Met
      is used as numerator instead.
      HEDIS rule: Act_Performance_Met + Act_Performance_Not_Met = 1
      for every denominator-eligible row (clinicalonlystatus=17).
    same_in_other_tables: null

  Act_Performance_Not_Met:
    data_type: INT
    nullable: false
    pk: false
    fk: null
    constraints: "Values: 0 or 1"
    index: null
    grain: "1 = member did NOT meet criteria (non-compliant), 0 = met"
    record_level_info: >
      Binary flag. SUM gives total non-compliant count.
      This is the NUMERATOR for inverted measures (NCQAInvertedFlag='Y').
      HEDIS rule: Always the inverse of Act_Performance_Met for DE rows.
    same_in_other_tables: null

  reportingExclusionStatus:
    data_type: INT
    nullable: false
    pk: false
    fk: null
    constraints: "Values: 0 or 1"
    index: null
    grain: "1 = member has a required exclusion, 0 = no exclusion"
    record_level_info: >
      Required exclusions are NCQA-defined conditions that remove a member
      from the denominator. Example: patient was in hospice.
      SUM gives total required exclusion count.
      HEDIS rule: Members with required exclusion should NOT be counted
      in Compliant or Non Compliant.
    same_in_other_tables: null

  # --- Clinical Status ---
  clinicalonlystatus:
    data_type: INT
    nullable: false
    pk: false
    fk: null
    constraints: "Values: 16, 17, 23, 24 (and possibly others)"
    index: "Non-clustered index"
    grain: "Clinical processing status of this member-measure row"
    record_level_info: >
      Determines which category this row falls into:
        16 = DVDE (Denominator Valid Data Error) — member had data but it was invalid
        17 = DE (Denominator Eligible) — member is eligible and in the denominator
        23 = ECC (Exclusion Clinical Code) — excluded by clinical code
        24 = ERF (Exclusion Required Field) — excluded due to missing required field
      
      This column is critical for counting VDE, EDE, ECC, ERF in reports.
      The count is done per entity type (patient/visit/event) based on
      measuredetails.measuretype.
      
      For quality reports, typically only clinicalonlystatus=17 (DE) rows
      contribute to Compliant/Non Compliant counts.
    same_in_other_tables: null

  # --- Entity SSUIs (for counting) ---
  patientSSUI:
    data_type: VARCHAR(50)
    nullable: true
    pk: false
    fk: null
    constraints: null
    index: null
    grain: "Unique patient identifier within this measure"
    record_level_info: >
      Used for COUNT when measuretype = 'Patient-Process'.
      COUNT(DISTINCT patientSSUI) gives unique patient count.
      NULL when this row's entity type is not patient.
    same_in_other_tables: null

  visitSSUI:
    data_type: VARCHAR(50)
    nullable: true
    pk: false
    fk: null
    constraints: null
    index: null
    grain: "Unique visit identifier within this measure"
    record_level_info: >
      Used for COUNT when measuretype = 'Visit'.
      NULL when this row's entity type is not visit.
    same_in_other_tables: null

  eventSSUI:
    data_type: VARCHAR(50)
    nullable: true
    pk: false
    fk: null
    constraints: null
    index: null
    grain: "Unique event identifier within this measure"
    record_level_info: >
      Used for COUNT when measuretype = 'Event'.
      NULL when this row's entity type is not event.
    same_in_other_tables: null

  # --- Filters and Flags ---
  isRaw:
    data_type: BIT
    nullable: false
    pk: false
    fk: null
    constraints: "Values: 0 or 1"
    index: null
    grain: "Whether this is raw (unaudited) data"
    record_level_info: >
      0 = Final/audited data — include in quality reports
      1 = Raw/preliminary data — EXCLUDE from all quality reports
      Standard fixed filter: WHERE isRaw = 0
    same_in_other_tables: null

  isUtilization:
    data_type: BIT
    nullable: false
    pk: false
    fk: null
    constraints: "Values: 0 or 1"
    index: null
    grain: "Whether this is a utilization measure"
    record_level_info: >
      0 = Quality measure — include in quality reports
      1 = Utilization measure — EXCLUDE from quality reports
      Standard fixed filter: WHERE isUtilization = 0
      Utilization measures have their own separate reports.
    same_in_other_tables: null

  enrollmentStatus:
    data_type: VARCHAR(20)
    nullable: false
    pk: false
    fk: null
    constraints: null
    index: null
    grain: "Member enrollment status"
    record_level_info: >
      Indicates whether the member was enrolled at the time of measurement.
      Used as a slicer in Power BI reports.
    same_in_other_tables: null

  # --- Submission and Year ---
  NCQA_Submission_ID_Name:
    data_type: VARCHAR(100)
    nullable: false
    pk: false
    fk: null
    constraints: null
    index: null
    grain: "Human-readable submission identifier"
    record_level_info: >
      Display name for the submission (e.g., "Submission 1", "Submission 2").
      Used as a slicer and in GROUP BY for most reports.
    same_in_other_tables: null

  MeasurementYear:
    data_type: VARCHAR(10)
    nullable: false
    pk: false
    fk: null
    constraints: null
    index: "Non-clustered index"
    grain: "HEDIS measurement year"
    record_level_info: >
      The year for which HEDIS measures are being reported.
      Format may be 'YYYY' or 'YYYY-YYYY'. SUBSTRING(MeasurementYear, 1, 4)
      extracts the 4-digit year for joins to cutpoints and keyvaluemapping.
    same_in_other_tables:
      - table: qualitycutpoints
        column: MeasurementYear
        relationship: "Join key (first 4 chars)"

  initiativeyear:
    data_type: VARCHAR(4)
    nullable: false
    pk: false
    fk: null
    constraints: null
    index: null
    grain: "Initiative/reporting year"
    record_level_info: >
      May differ from MeasurementYear in some configurations.
      Used in some keyvaluemapping joins.
    same_in_other_tables: null

  # --- Provider and Product ---
  providerGroupID:
    data_type: INT
    nullable: false
    pk: false
    fk: "dimprovidergroup.providerGroupID"
    constraints: null
    index: "Non-clustered index"
    grain: "Provider group this member is attributed to"
    record_level_info: >
      FK to dimprovidergroup. Join also requires domainid for uniqueness.
    same_in_other_tables:
      - table: dimprovidergroup
        column: providerGroupID
        relationship: "PK (with domainid) in dimprovidergroup"

  KeyToProvider:
    data_type: VARCHAR(50)
    nullable: false
    pk: false
    fk: "CONCAT(dimprovider_RDM.domainid, '-', dimprovider_RDM.sourcesystemuniqueidentifier)"
    constraints: "Format: {domainid}-{sourcesystemuniqueidentifier}"
    index: "Non-clustered index"
    grain: "Composite key to provider dimension"
    record_level_info: >
      NOT a standard FK. This is a concatenated string of domainid + '-' +
      sourcesystemuniqueidentifier. Must use CONCAT in join condition.
      Example values: '1042-PAT00123', '2001-EVT00789'
    same_in_other_tables:
      - table: dimprovider_RDM
        column: "CONCAT(domainid, '-', sourcesystemuniqueidentifier)"
        relationship: "Concatenation-based join"

  ProductCategoryID:
    data_type: INT
    nullable: false
    pk: false
    fk: "dimproductcategory.ProductCategoryID"
    constraints: null
    index: null
    grain: "Line of Business identifier"
    record_level_info: >
      FK to dimproductcategory. Maps to LOB names:
      Commercial, Medicaid, Medicare.
    same_in_other_tables:
      - table: dimproductcategory
        column: ProductCategoryID
        relationship: "PK in dimproductcategory"
      - table: qualitycutpoints
        column: ProductCategoryId
        relationship: "Part of composite key in cutpoints"

  domainid:
    data_type: INT
    nullable: false
    pk: false
    fk: null
    constraints: null
    index: null
    grain: "Domain/tenant identifier"
    record_level_info: >
      Used in composite joins to dimprovidergroup (providerGroupID + domainid)
      and as part of KeyToProvider concatenation.
    same_in_other_tables:
      - table: dimprovidergroup
        column: domainid
        relationship: "Part of composite join key"
      - table: qualitycutpoints
        column: domainid
        relationship: "Part of composite key in cutpoints"

  minimumrequiredsamplesize:
    data_type: INT
    nullable: true
    pk: false
    fk: null
    constraints: null
    index: null
    grain: "MRSS for hybrid measures"
    record_level_info: >
      Minimum Required Sample Size — only applicable for hybrid measures.
      NULL for administrative-only measures. Displayed as '-' when NULL.
    same_in_other_tables: null

  submissionsourcesfeedtype:
    data_type: VARCHAR(50)
    nullable: true
    pk: false
    fk: null
    constraints: null
    index: null
    grain: "Source feed type for IDSS reporting"
    record_level_info: >
      Identifies the data source feed type (e.g., Administrative, Supplemental).
      Used in IDSS Hierarchy reports to break down measures by source.
    same_in_other_tables: null

  oversample:
    data_type: VARCHAR(10)
    nullable: true
    pk: false
    fk: null
    constraints: null
    index: null
    grain: "Whether this row is from an oversampled population"
    record_level_info: >
      Used for hybrid measures where additional chart reviews are performed.
    same_in_other_tables: null
