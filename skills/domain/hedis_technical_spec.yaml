    continuous_enrollment: "Measurement year"
    anchor_date: "December 31 of MY"
    denominator: "Members 3-17 with outpatient visit during MY"
    required_exclusions: [Hospice, Deceased, Pregnancy]
    data_sources: [Administrative, Hybrid]
    star_rated: false
    inverse: false
    sub_measures:
      WCC-01:
        name: "BMI Percentile"
        numerator: "BMI percentile documented during MY"
      WCC-02:
        name: "Counseling for Nutrition"
        numerator: "Nutrition counseling documented during MY"
      WCC-03:
        name: "Counseling for Physical Activity"
        numerator: "Physical activity counseling documented during MY"

  IMA:
    code: IMA
    name: "Immunizations for Adolescents"
    measure_type: Patient-Process
    product_lines: [Commercial, Medicaid]
    ages: "13 years (turning 13 during MY)"
    continuous_enrollment: "12 months prior to 13th birthday"
    anchor_date: "13th birthday"
    denominator: "Adolescents turning 13 during MY"
    required_exclusions: [Hospice, Deceased]
    data_sources: [Administrative, Hybrid]
    star_rated: true
    inverse: false
    sub_measures:
      IMA-01: "Combination 2 (Meningococcal + Tdap)"

# ============================================================
# COMMON REQUIRED EXCLUSIONS
# ============================================================
required_exclusions:

  Hospice:
    description: "Member enrolled in hospice or using hospice services during MY"
    applies_to: "All measures"
    detection: "Hospice encounter or enrollment record"

  Deceased:
    description: "Member deceased during MY"
    applies_to: "All measures"
    detection: "Death date on file"

  Bilateral_Mastectomy:
    description: "History of bilateral mastectomy"
    applies_to: [BCS]
    detection: "Bilateral mastectomy procedure code or two unilateral codes"

  Colorectal_Cancer:
    description: "History of colorectal cancer"
    applies_to: [COL]
    detection: "Colorectal cancer diagnosis code"

  Total_Colectomy:
    description: "History of total colectomy"
    applies_to: [COL]
    detection: "Total colectomy procedure code"

  ESRD:
    description: "End-Stage Renal Disease"
    applies_to: [CBP]
    detection: "ESRD diagnosis or dialysis codes"

  Kidney_Transplant:
    description: "History of kidney transplant"
    applies_to: [CBP]
    detection: "Kidney transplant procedure code"

  Pregnancy:
    description: "Pregnancy during MY"
    applies_to: [CBP, WCC]
    detection: "Pregnancy diagnosis code"

# ============================================================
# REPORT TYPES & STANDARD STRUCTURE
# ============================================================
report_types:

  MeasureList:
    description: "One row per measure per submission. Shows compliance rates and rankings."
    typical_group_by: [Measures, Submission]
    typical_columns:
      - Measures
      - Submission
      - "Compliance %"
      - MRSS
      - Denominator
      - Compliant
      - "Non Compliant"
      - "Required Exclusion"
      - VDE
      - EDE
      - ECC
      - ERF
      - "Current PCTL"
      - "To reach (25th PCTL)"
      - "To reach (50th PCTL)"
      - "To reach (75th PCTL)"
      - "To reach (90th PCTL)"
    composite_key: [Measures, Submission]

  IDSSHierarchy:
    description: "Breakdown by source system and feed type. Shows where data originates."
    typical_group_by: [Measures, Submission, "Source Feed Type", "Source System"]
    typical_columns:
      - Measures
      - Submission
      - "Source Feed Type"
      - "Source System"
      - Denominator
      - Compliant
      - "Non Compliant"
      - "Required Exclusion"
    composite_key: [Measures, Submission, "Source Feed Type", "Source System"]

  ProviderDetail:
    description: "Provider-level performance. Shows compliance by provider group and provider."
    typical_group_by: [Measures, Submission, "Provider Group", "Provider Name"]
    typical_columns:
      - Measures
      - Submission
      - "Provider Group"
      - "Provider Name"
      - "Provider NPI"
      - Denominator
      - Compliant
      - "Compliance %"
    composite_key: [Measures, Submission, "Provider Group", "Provider Name"]

  GapsInCare:
    description: "Member-level detail for non-compliant members. Used for outreach."
    typical_group_by: [Measures, Submission, "Member ID"]
    typical_columns:
      - Measures
      - Submission
      - "Member ID"
      - "Member Name"
      - "Provider Name"
      - "Last Service Date"
      - "Gap Reason"
    composite_key: [Measures, Submission, "Member ID"]

# ============================================================
# STANDARD SLICERS (Power BI Filters)
# ============================================================
standard_slicers:

  required:
    - name: "Organization Name"
      column: "A.organizationname"
      source_table: factqualityreport
      required_for_all: true

    - name: "Measurement Year"
      column: "A.MeasurementYear"
      source_table: factqualityreport
      required_for_all: true

  optional:
    - name: "Line of Business"
      column: "D.productcategoryname"
      source_table: dimproductcategory
      values: [Commercial, Medicaid, Medicare]

    - name: "Business Group"
      column: "A.businessgroupcode"
      source_table: factQualityReport_Filters

    - name: "Submission"
      column: "A.NCQA_Submission_ID_Name"
      source_table: factqualityreport

    - name: "Products"
      column: "A.productname"
      source_table: factQualityReport_Filters

    - name: "Health Plans"
      column: "A.healthplanname"
      source_table: factQualityReport_Filters

    - name: "NCQA Domain"
      column: "M.CMQDOMAIN"
      source_table: measuredetails

    - name: "Health Category"
      column: "M.category"
      source_table: measuredetails

    - name: "Measures"
      column: "Measures"
      note: "Computed: CONCAT(submeasurecode, ' ', name)"

    - name: "Enrollment Status"
      column: "A.enrollmentStatus"
      source_table: factqualityreport

# ============================================================
# CROSS-FIELD VALIDATION RULES
# ============================================================
cross_field_validations:

  - rule: "Compliant <= Denominator"
    severity: error
    applies_when: "Always"

  - rule: "Non Compliant <= Denominator"
    severity: error
    applies_when: "Always"

  - rule: "Compliant + Non Compliant == Denominator"
    severity: error
    applies_when: "For aggregated rows"

  - rule: "Compliance % between 0 and 100"
    severity: error
    applies_when: "When Denominator > 0"

  - rule: "Required Exclusion <= Denominator + Required Exclusion"
    severity: warning
    applies_when: "Always"

  - rule: "PCTL must be one of: <25th, 25th, 50th, 75th, 90th, NULL"
    severity: error
    applies_when: "Always"

  - rule: "Gap to PCTL must be NULL or positive integer"
    severity: error
    applies_when: "Always"

  - rule: "VDE + EDE + ECC + ERF should account for all members"
    severity: warning
    applies_when: "When clinical status columns present"

  - rule: "Inverted measures: Compliance % calculated from Non Compliant"
    severity: error
    applies_when: "NCQAInvertedFlag = 'Y'"

# ============================================================
# CROSS-REPORT VALIDATION RULES
# ============================================================
cross_report_validations:

  - source_report: MeasureList
    source_column: Denominator
    target_report: IDSSHierarchy
    target_column: "SUM(Denominator)"
    match_by: [Measures, Submission]
    rule: "MeasureList Denominator = SUM of IDSS Denominator for same measure"
    severity: error

  - source_report: MeasureList
    source_column: Compliant
    target_report: IDSSHierarchy
    target_column: "SUM(Compliant)"
    match_by: [Measures, Submission]
    rule: "MeasureList Compliant = SUM of IDSS Compliant for same measure"
    severity: error

  - source_report: MeasureList
    source_column: Denominator
    target_report: ProviderDetail
    target_column: "SUM(Denominator)"
    match_by: [Measures, Submission]
    rule: "MeasureList Denominator = SUM of Provider Denominator for same measure"
    severity: warning
    note: "May differ due to attribution model"
