# ============================================================
# MEASURE TYPES
# Determines which SSUI column to count
# ============================================================
measure_types:
  Visit:
    count_entity: visitSSUI
    description: "One row per visit. COUNT(visitSSUI) gives visit count."
    example_measures: [AWC]

  Event:
    count_entity: eventSSUI
    description: "One row per event. COUNT(eventSSUI) gives event count."
    example_measures: [FUA, PCE]

  Patient-Process:
    count_entity: patientSSUI
    description: "One row per patient. COUNT(patientSSUI) gives patient count."
    example_measures: [BCS, CBP, CIS, COL, CDC]

# ============================================================
# CLINICAL STATUS CODES
# What clinicalonlystatus values mean
# ============================================================
clinical_status_codes:
  16:
    label: DVDE
    full_name: Denominator Valid Data Error
    meaning: "Member had data but it was invalid or incomplete"
    report_column: VDE
    count_logic: "COUNT(entitySSUI) WHERE clinicalonlystatus IN (16, 17)"
    note: "VDE = DVDE count minus DE count (members with data errors)"

  17:
    label: DE
    full_name: Denominator Eligible
    meaning: "Member is eligible and included in the denominator"
    report_column: EDE
    count_logic: "COUNT(entitySSUI) WHERE clinicalonlystatus = 17"
    note: "These are the rows that contribute to Compliant/Non Compliant"

  23:
    label: ECC
    full_name: Exclusion by Clinical Code
    meaning: "Member excluded due to a clinical code (diagnosis, procedure)"
    report_column: ECC
    count_logic: "COUNT(entitySSUI) WHERE clinicalonlystatus = 23"

  24:
    label: ERF
    full_name: Exclusion by Required Field
    meaning: "Member excluded due to missing required data field"
    report_column: ERF
    count_logic: "COUNT(entitySSUI) WHERE clinicalonlystatus = 24"

# ============================================================
# PERFORMANCE METRICS
# How Compliant, Non Compliant, Denominator relate
# ============================================================
performance_metrics:
  compliant:
    source_column: Act_Performance_Met
    aggregation: SUM
    meaning: "Count of members who met the performance criteria"
    values: [0, 1]
    rule: "1 = met criteria, 0 = did not"

  non_compliant:
    source_column: Act_Performance_Not_Met
    aggregation: SUM
    meaning: "Count of members who did NOT meet the performance criteria"
    values: [0, 1]
    rule: "Always the inverse of Act_Performance_Met for DE rows"

  denominator:
    formula: "SUM(Act_Performance_Met) + SUM(Act_Performance_Not_Met)"
    meaning: "Total eligible population = Compliant + Non Compliant"
    note: "Does NOT include excluded members (ECC, ERF)"

  required_exclusion:
    source_column: reportingExclusionStatus
    aggregation: SUM
    meaning: "Members with NCQA-defined required exclusions"

  optional_exclusion:
    source_column: optionalExclusionStatus
    aggregation: SUM
    meaning: "Members with optional exclusions (client can choose to apply)"

  relationships:
    - "Compliant + Non Compliant = Denominator (always)"
    - "Compliant <= Denominator (always)"
    - "Non Compliant <= Denominator (always)"
    - "Required Exclusion members are NOT in Denominator"
    - "Optional Exclusion members are NOT in Denominator (when applied)"
    - "Compliant >= 0 (never negative)"
    - "Non Compliant >= 0 (never negative)"
    - "Denominator >= 0 (never negative)"

# ============================================================
# COMPLIANCE CALCULATION
# How Compliance % is computed
# ============================================================
compliance_calculation:
  description: "Compliance % depends on NCQAInvertedFlag"

  normal_measure:
    condition: "NCQAInvertedFlag = 'N' or NULL"
    formula: "ROUND(SUM(Compliant) * 100 / NULLIF(SUM(Denominator), 0), 2)"
    meaning: "Higher % = better performance"

  inverted_measure:
    condition: "NCQAInvertedFlag = 'Y'"
    formula: "ROUND(SUM(NonCompliant) * 100 / NULLIF(SUM(Denominator), 0), 2)"
    meaning: "For inverted measures, NonCompliant is the numerator"

  sql_pattern: |
    CASE
      WHEN M.NCQAInvertedFlag = 'Y' THEN
        ROUND(SUM(A.Act_Performance_Not_Met) * 100.0
          / NULLIF(SUM(A.Act_Performance_Met) + SUM(A.Act_Performance_Not_Met), 0), 2)
      ELSE
        ROUND(SUM(A.Act_Performance_Met) * 100.0
          / NULLIF(SUM(A.Act_Performance_Met) + SUM(A.Act_Performance_Not_Met), 0), 2)
    END

  validation_rules:
    - "Result must be between 0 and 100"
    - "NULL when Denominator = 0"

# ============================================================
# PERCENTILE (PCTL) CALCULATION
# NCQA percentile ranking using cutpoints
# ============================================================
percentile_calculation:
  description: "Ranks compliance % into NCQA percentile buckets using cutpoints"

  cutpoints:
    Cutpoint3: "25th percentile threshold"
    Cutpoint5: "50th percentile threshold"
    Cutpoint7: "75th percentile threshold"
    Cutpoint8: "90th percentile threshold"

  buckets:
    - label: "<25th"
      normal_condition: "rate < Cutpoint3"
      inverted_condition: "rate > Cutpoint3"
    - label: "25th"
      normal_condition: "rate >= Cutpoint3 AND rate < Cutpoint5"
      inverted_condition: "rate <= Cutpoint3 AND rate > Cutpoint5"
    - label: "50th"
      normal_condition: "rate >= Cutpoint5 AND rate < Cutpoint7"
      inverted_condition: "rate <= Cutpoint5 AND rate > Cutpoint7"
    - label: "75th"
      normal_condition: "rate >= Cutpoint7 AND rate < Cutpoint8"
      inverted_condition: "rate <= Cutpoint7 AND rate > Cutpoint8"
    - label: "90th"
      normal_condition: "rate >= Cutpoint8"
      inverted_condition: "rate <= Cutpoint8"

  null_conditions:
    - "Denominator = 0"
    - "All cutpoints = 0 (no cutpoints published for this measure)"

  branching_logic:
    description: "4-way branch based on NCQAInvertedFlag × InverseFlag"
    branches:
      - ncqa_inverted: "Y"
        inverse: "N"
        numerator: NonCompliant
        comparison: normal
      - ncqa_inverted: "Y"
        inverse: "Y"
        numerator: NonCompliant
        comparison: inverted
      - ncqa_inverted: "N"
        inverse: "N"
        numerator: Compliant
        comparison: normal
      - ncqa_inverted: "N"
        inverse: "Y"
        numerator: Compliant
        comparison: inverted

  gap_to_percentile:
    description: "How many more compliant members needed to reach a percentile"
    formula_normal: "CEIL((Denominator * Cutpoint / 100) - Numerator)"
    formula_inverted: "CEIL(Numerator - (Denominator * Cutpoint / 100))"
    display_rule: "NULL when already at or above the percentile (result <= 0)"

# ============================================================
# FLAG LOGIC
# What each flag means and how it affects calculations
# ============================================================
flags:
  NCQAInvertedFlag:
    source_table: measuredetails
    values:
      "Y": "Use Non Compliant as numerator for compliance calculation"
      "N": "Use Compliant as numerator (default/normal)"
    affects: [compliance_calculation, percentile_calculation]

  InverseFlag:
    source_table: measuredetails
    values:
      "Y": "Lower rate is better — reverse percentile comparison direction. Append '(Inverse)' to measure display name."
      "N": "Higher rate is better (default/normal)"
    affects: [percentile_calculation, measure_display_name]

  STARINDICATOR:
    source_table: measuredetails
    values:
      "Y": "CMS Star-rated measure — append '*' to measure code in display"
      null: "Not star-rated"
    affects: [measure_display_name]

# ============================================================
# MEASURE DISPLAY NAME CONSTRUCTION
# How the "Measures" column is built
# ============================================================
measure_display_name:
  description: "Concatenated display name shown in reports"
  pattern: "{code}{star} {name}{inverse}"
  components:
    code: "submeasurecode from measuredetails, OR KEYVALUE from keyvaluemapping if measure was merged"
    star: "'*' if STARINDICATOR = 'Y', else empty"
    name: "name from measuredetails, OR name looked up via merged code"
    inverse: "' (Inverse)' if InverseFlag = 'Y', else empty"
  example_outputs:
    - "AWC-01* Adolescent Well-Care Visits"
    - "CBP-01 Controlling High Blood Pressure"
    - "PCE-01 Pharmacotherapy Management of COPD Exacerbation (Inverse)"
  requires_tables: [measuredetails, keyvaluemapping]

# ============================================================
# STANDARD FIXED FILTERS
# Applied to ALL quality reports
# ============================================================
standard_fixed_filters:
  - column: isRau
    value: 0
    meaning: "Exclude raw/unaudited data"
    applies_to: "All quality reports"

  - column: isUtilization
    value: 0
    meaning: "Exclude utilization measures (they have separate reports)"
    applies_to: "All quality reports"

  - column: RN
    value: 1
    meaning: "Deduplication — take first row per factssui + SubmissionId"
    applies_to: "All quality reports"
    implementation: "ROW_NUMBER() OVER (PARTITION BY factssui, SubmissionId ORDER BY factssui, SubmissionId ASC)"

