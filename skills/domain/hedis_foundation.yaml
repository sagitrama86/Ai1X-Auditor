slicer_sql_pattern: |
  AND {column} = COALESCE(
    CASE WHEN LEN({parameter}) < 1 THEN NULL ELSE {parameter} END,
    {column}
  )

# ============================================================
# STANDARD CROSS-FIELD VALIDATION RULES
# Auto-applied to any report with these columns
# ============================================================
standard_cross_field_rules:
  - rule: "Compliant <= Denominator"
    severity: error
    reason: "Compliant is a subset of Denominator"
    applies_when: "Report has both Compliant and Denominator columns"

  - rule: "Non Compliant <= Denominator"
    severity: error
    reason: "Non Compliant is a subset of Denominator"
    applies_when: "Report has both Non Compliant and Denominator columns"

  - rule: "Compliant + Non Compliant = Denominator"
    severity: error
    reason: "Denominator is defined as Compliant + Non Compliant"
    applies_when: "Report has all three columns"

  - rule: "Required Exclusion <= Denominator"
    severity: warning
    reason: "Exclusions should not exceed the eligible population"
    applies_when: "Report has both columns"

  - rule: "Optional Exclusion <= Denominator"
    severity: warning
    reason: "Exclusions should not exceed the eligible population"
    applies_when: "Report has both columns"

  - rule: "Compliance % between 0 and 100"
    severity: error
    reason: "Percentage cannot exceed 100 or be negative"
    applies_when: "Report has Compliance % column"

  - rule: "Compliance % = NULL when Denominator = 0"
    severity: error
    reason: "Division by zero should produce NULL, not 0 or error"
    applies_when: "Report has both columns"

  - rule: "VDE + EDE + ECC + ERF <= total member count"
    severity: warning
    reason: "Clinical status counts should not exceed total"
    applies_when: "Report has VDE, EDE, ECC, ERF columns"

  - rule: "Current PCTL must be one of: <25th, 25th, 50th, 75th, 90th, NULL"
    severity: error
    reason: "Only valid NCQA percentile buckets allowed"
    applies_when: "Report has Current PCTL column"

  - rule: "To reach percentile values must be positive or NULL"
    severity: error
    reason: "Gap-to-percentile is NULL when already achieved, positive otherwise"
    applies_when: "Report has To reach columns"

# ============================================================
# STANDARD FIELD TEMPLATES
# Reusable SQL patterns for common report columns
# ============================================================
field_templates:
  Measures:
    data_type: String
    sql_expression: |
      CONCAT(
        CASE WHEN KVM.KEYVALUE IS NULL THEN M.SUBMEASURECODE ELSE KVM.KEYVALUE END,
        IIF(M.STARINDICATOR = 'Y', '*', ''),
        ' ',
        CASE WHEN KVM.KEYVALUE IS NULL THEN M.name
             ELSE (SELECT name FROM measuredetails WHERE submeasurecode = KVM.KEYVALUE) END,
        IIF(M.InverseFlag = 'Y', ' (Inverse)', '')
      )
    requires_joins: [measuredetails, keyvaluemapping]
    is_aggregate: false

  Submission:
    data_type: String
    sql_expression: "A.NCQA_Submission_ID_Name"
    is_aggregate: false

  "Compliance %":
    data_type: Percentage
    sql_expression: "compliance_calculation.sql_pattern"
    is_aggregate: true
    validation: {type: range, min: 0, max: 100}

  Denominator:
    data_type: Integer
    sql_expression: "SUM(A.Act_Performance_Met) + SUM(A.Act_Performance_Not_Met)"
    is_aggregate: true
    validation: {type: range, min: 0}

  Compliant:
    data_type: Integer
    sql_expression: "SUM(A.Act_Performance_Met)"
    is_aggregate: true
    cross_field: "Compliant <= Denominator"

  "Non Compliant":
    data_type: Integer
    sql_expression: "SUM(A.Act_Performance_Not_Met)"
    is_aggregate: true
    cross_field: "Non Compliant <= Denominator"

  "Required Exclusion":
    data_type: Integer
    sql_expression: "SUM(A.reportingExclusionStatus)"
    is_aggregate: true

  "Optional Exclusion":
    data_type: Integer
    sql_expression: "SUM(A.optionalExclusionStatus)"
    is_aggregate: true

  MRSS:
    data_type: String
    sql_expression: "COALESCE(CAST(A.minimumrequiredsamplesize AS VARCHAR(20)), '-')"
    is_aggregate: false

  VDE:
    data_type: Integer
    sql_expression: "clinical_status_count(16, 17)"
    note: "COUNT where clinicalonlystatus IN (16,17) minus COUNT where =17"
    is_aggregate: true
    allow_null: true

  EDE:
    data_type: Integer
    sql_expression: "clinical_status_count(17)"
    is_aggregate: true
    allow_null: true

  ECC:
    data_type: Integer
    sql_expression: "clinical_status_count(23)"
    is_aggregate: true
    allow_null: true

  ERF:
    data_type: Integer
    sql_expression: "clinical_status_count(24)"
    is_aggregate: true
    allow_null: true

  "Current PCTL":
    data_type: String
    sql_expression: "percentile_calculation"
    is_aggregate: true
    allow_null: true
    validation: {type: enum, values: ["<25th", "25th", "50th", "75th", "90th"]}

  "To reach (25th PCTL)":
    data_type: Integer
    sql_expression: "gap_to_percentile(Cutpoint3)"
    is_aggregate: true
    allow_null: true

  "To reach (50th PCTL)":
    data_type: Integer
    sql_expression: "gap_to_percentile(Cutpoint5)"
    is_aggregate: true
    allow_null: true

  "To reach (75th PCTL)":
    data_type: Integer
    sql_expression: "gap_to_percentile(Cutpoint7)"
    is_aggregate: true
    allow_null: true

  "To reach (90th PCTL)":
    data_type: Integer
    sql_expression: "gap_to_percentile(Cutpoint8)"
    is_aggregate: true
    allow_null: true

  "Source Feed Type":
    data_type: String
    sql_expression: "A.submissionsourcesfeedtype"
    is_aggregate: false
    note: "Used in IDSS Hierarchy reports"

  "Source System":
    data_type: String
    sql_expression: "A.sourcesystemname"
    is_aggregate: false
    note: "Used in IDSS Hierarchy reports"

  Entity:
    data_type: String
    sql_expression: "A.Subnetwork"
    is_aggregate: false
    note: "From factQualityReport_Filters — requires attribution model check"

# ============================================================
# REPORT TYPES
# Known HEDIS report patterns
# ============================================================
report_types:
  MeasureList:
    description: "Measure-level summary — one row per measure per submission"
    typical_group_by: [Measures, Submission]
    typical_columns: [Measures, Submission, "Compliance %", Denominator, Compliant, "Non Compliant", "Required Exclusion", MRSS, VDE, EDE, ECC, ERF, "Current PCTL"]
    base_table: factqualityreport

  ProviderDetail:
    description: "Provider-level breakdown — one row per measure per provider"
    typical_group_by: [Measures, Submission, Entity, ProviderGroup]
    typical_columns: [Entity, Measures, Submission, "Compliance %", Denominator, Compliant, "Non Compliant"]
    base_table: factqualityreport

  IDSSHierarchy:
    description: "Source system breakdown — measures split by data source feed type and source system"
    typical_group_by: [Measures, Submission, "Source Feed Type", "Source System"]
    typical_columns: [Measures, Submission, "Compliance %", MRSS, Denominator, Compliant, "Optional Exclusion", "Required Exclusion", VDE, EDE, ECC, ERF, "Source Feed Type", "Source System"]
    base_table: factqualityreport
    note: "Same measures as MeasureList but further broken down by source"

  GapsInCare:
    description: "Member-level detail — individual members who are non-compliant"
    typical_group_by: [PatientID, Measures]
    typical_columns: [PatientID, Measures, ComplianceStatus, ProviderName, LastVisitDate]
    base_table: factqualityreport
    note: "Different grain — member level, not aggregate"

# ============================================================
# CROSS-REPORT RELATIONSHIPS
# How reports relate to each other
# ============================================================
cross_report_relationships:
  - source: MeasureList
    target: IDSSHierarchy
    relationship: "IDSSHierarchy is a breakdown of MeasureList by Source Feed Type + Source System"
    validation: "SUM of Denominator in IDSSHierarchy per Measure+Submission = Denominator in MeasureList"

  - source: MeasureList
    target: ProviderDetail
    relationship: "ProviderDetail is a breakdown of MeasureList by Provider/Entity"
    validation: "SUM of Denominator in ProviderDetail per Measure+Submission = Denominator in MeasureList"

  - source: MeasureList
    target: GapsInCare
    relationship: "GapsInCare lists individual members from MeasureList Non Compliant count"
    validation: "COUNT of non-compliant members in GapsInCare per Measure = Non Compliant in MeasureList"

# ============================================================
# LINES OF BUSINESS
# ============================================================
lines_of_business:
  Commercial:
    description: "Employer-sponsored and individual market health plans"
    product_category_names: [Commercial, Commercial HMO, Commercial PPO]

  Medicaid:
    description: "State-funded health coverage for low-income individuals"
    product_category_names: [Medicaid, Medicaid HMO]

  Medicare:
    description: "Federal health coverage for 65+ and disabled individuals"
    product_category_names: [Medicare, Medicare HMO, Medicare PPO]
