<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI1X Auditor - Report Fields</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;z-index:10}
.sidebar-logo{padding:20px;font-size:18px;font-weight:700;color:#58a6ff;border-bottom:1px solid #30363d}
.sidebar-nav{flex:1;padding:12px;overflow-y:auto}
.nav-section{margin-bottom:20px}
.nav-section-title{font-size:11px;text-transform:uppercase;color:#8b949e;padding:8px 12px;letter-spacing:.5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;color:#c9d1d9;cursor:pointer;font-size:13px;transition:all .15s;text-decoration:none}
.nav-item:hover{background:#1f2937}
.nav-item.active{background:#1f6feb22;color:#58a6ff}
.sidebar-footer{padding:16px;border-top:1px solid #30363d}
.schema-status{display:flex;align-items:center;gap:8px;font-size:12px;color:#8b949e}
.status-dot{width:8px;height:8px;border-radius:50%;background:#3fb950}
.main{margin-left:260px;padding:32px 40px}
h1{font-size:24px;font-weight:600;margin-bottom:6px}
.subtitle{color:#8b949e;font-size:14px;margin-bottom:24px}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:#8b949e;margin-bottom:16px}
.breadcrumb a{color:#58a6ff;text-decoration:none}
.tab-bar{display:flex;border-bottom:1px solid #30363d;margin-bottom:0}
.tab{padding:10px 16px;font-size:13px;color:#8b949e;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:#c9d1d9}
.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.tab-content{background:#161b22;border:1px solid #30363d;border-top:none;border-radius:0 0 12px 12px;min-height:300px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:8px 14px;font-size:10px;text-transform:uppercase;color:#484f58;border-bottom:1px solid #30363d;background:#0d1117}
.tbl td{padding:7px 14px;border-bottom:1px solid #21262d;font-size:12px}
.inline-inp{background:#0d1117;border:1px solid transparent;border-radius:3px;color:#c9d1d9;padding:3px 6px;font-size:11px;width:100%;font-family:inherit}
.inline-inp:focus{border-color:#58a6ff;outline:none}
.inline-inp:hover{border-color:#30363d}
.inline-sel{background:#0d1117;border:1px solid transparent;border-radius:3px;color:#a371f7;padding:3px 4px;font-size:11px;font-family:inherit;cursor:pointer}
.inline-sel:focus{border-color:#58a6ff;outline:none}
.inline-sel:hover{border-color:#30363d}
.add-btn{margin:10px 14px;padding:6px 14px;background:transparent;border:1px dashed #30363d;border-radius:8px;color:#8b949e;font-size:12px;cursor:pointer}
.add-btn:hover{border-color:#58a6ff;color:#58a6ff}
.btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#1f6feb;color:#fff}
.btn-outline{background:transparent;color:#8b949e;border:1px solid #30363d}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:#1f6feb22;color:#58a6ff;margin:1px}
.status-badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;background:#3fb95022;color:#3fb950}
.section{padding:16px 20px}
.section-title{font-size:13px;font-weight:600;margin-bottom:8px}
.rule-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #21262d;font-size:12px}
.chat-input{display:flex;gap:8px;padding:16px 20px;border-top:1px solid #30363d}
.chat-inp{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e1e4e8;padding:10px 14px;font-size:13px;font-family:inherit}
.chat-inp:focus{outline:none;border-color:#58a6ff}
.chat-inp::placeholder{color:#484f58}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">🔷 AI1X Auditor</div>
  <div class="sidebar-nav">
    <div class="nav-section"><div class="nav-section-title">Main</div>
      <div class="nav-item" onclick="location='05-home-loaded.html'">🏠 Home</div>
      <div class="nav-item" onclick="location='02-connect.html'">🔌 Database</div>
      <div class="nav-item" onclick="location='06-ai-chat.html'">🖥️ AI1X CLI</div></div>
    <div class="nav-section"><div class="nav-section-title">Workspace</div>
      <div class="nav-item" onclick="location='15-data-dictionary.html'">📚 Data Dictionary</div>
      <div class="nav-item active" onclick="location='08-reports.html'">📄 Reports</div>
      <div class="nav-item" onclick="location='07-generate-sql.html'">🛢️ Generate SQL</div>
      <div class="nav-item" onclick="location='10-compare.html'">⚖️ Compare</div>
      <div class="nav-item" onclick="location='14-run-history.html'">📜 Run History</div></div>
    <div class="nav-section"><div class="nav-section-title">Info</div>
      <div class="nav-item" onclick="location='17-user-guide.html'">📖 User Guide</div></div>
  </div>
  <div class="sidebar-footer"><div class="schema-status"><span class="status-dot"></span> HEDIS_RDW</div></div>
</div>
<div class="main">
  <div class="breadcrumb"><a href="05-home-loaded.html">Home</a> / <a href="08-reports.html">Reports</a> / <span id="bc-name">Loading...</span></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
    <div><h1 id="report-title">Loading...</h1><p class="subtitle" id="report-sub"></p></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="genSQL()">🛢️ Generate SQL</button>
      <span class="status-badge" id="report-status"></span>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('fields')">Fields</div>
    <div class="tab" onclick="switchTab('slicers')">Slicers</div>
    <div class="tab" onclick="switchTab('validations')">Validations</div>
    <div class="tab" onclick="switchTab('config')">Config</div>
  </div>
  <div class="tab-content" id="tab-content"></div>
  <div class="chat-input">
    <input class="chat-inp" id="chat-inp" placeholder="Ask AI to modify this report... e.g. 'Add Compliance % field' or 'Remove VDE column'" onkeydown="if(event.key==='Enter')sendChat()">
    <button class="btn btn-primary" onclick="sendChat()">Send</button>
  </div>
  <div id="chat-response" style="padding:12px 20px;font-size:13px;color:#8b949e;white-space:pre-wrap"></div>
</div>
<script>
const API='http://localhost:8000';
const params=new URLSearchParams(location.search);
const reportId=params.get('id')||'measurelist';
let report=null;

async function init(){
  const resp=await fetch(API+'/api/reports/'+reportId);
  report=await resp.json();
  if(report.error){document.getElementById('report-title').textContent='Report not found';return}
  document.getElementById('bc-name').textContent=report.report_name||reportId;
  document.getElementById('report-title').textContent=report.report_name||reportId;
  document.getElementById('report-sub').textContent=`${reportId} · ${(report.fields||[]).length} fields · ${(report.slicers||[]).length} slicers`;
  document.getElementById('report-status').textContent=report.status||'ready';
  switchTab('fields');
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>{t.classList.toggle('active',t.textContent.toLowerCase()===tab)});
  const tc=document.getElementById('tab-content');

  if(tab==='fields'){
    const fields=report.fields||[];
    const types=['String','Integer','Decimal','Percentage','Date','Datetime'];
    const rows=fields.map((f,i)=>`<tr data-idx="${i}">
      <td style="color:#484f58">${i+1}</td>
      <td><input class="inline-inp f-edit" data-field="display_name" value="${(f.display_name||'').replace(/"/g,'&quot;')}"></td>
      <td><input class="inline-inp f-edit" data-field="template_ref" value="${(f.template_ref||'').replace(/"/g,'&quot;')}" style="width:120px"></td>
      <td><select class="inline-sel f-edit" data-field="data_type">${types.map(t=>`<option${t===f.data_type?' selected':''}>${t}</option>`).join('')}</select></td>
      <td style="text-align:center"><input type="checkbox" class="f-edit" data-field="allow_null" ${f.allow_null!==false?'checked':''}></td>
      <td style="text-align:center"><input type="checkbox" class="f-edit" data-field="is_aggregate" ${f.is_aggregate?'checked':''}></td>
      <td><button onclick="deleteField(${i})" style="background:none;border:none;color:#f85149;cursor:pointer;font-size:13px;opacity:0.4" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.4">✕</button></td>
    </tr>`).join('');
    tc.innerHTML=`<table class="tbl"><thead><tr><th>#</th><th>Display Name</th><th>Template Ref</th><th>Type</th><th>Null</th><th>Agg</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      <button class="add-btn" onclick="addField()">+ Add Field</button>`;

  }else if(tab==='slicers'){
    const slicers=report.slicers||[];
    const rows=slicers.map((s,i)=>`<tr>
      <td style="color:#484f58">${i+1}</td>
      <td><input class="inline-inp sl-edit" data-idx="${i}" data-field="name" value="${(s.name||'').replace(/"/g,'&quot;')}"></td>
      <td style="text-align:center"><input type="checkbox" class="sl-edit" data-idx="${i}" data-field="required" ${s.required?'checked':''}></td>
      <td><button onclick="deleteSlicer(${i})" style="background:none;border:none;color:#f85149;cursor:pointer;font-size:13px;opacity:0.4" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.4">✕</button></td>
    </tr>`).join('');
    tc.innerHTML=`<table class="tbl"><thead><tr><th>#</th><th>Slicer Name</th><th>Required</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      <button class="add-btn" onclick="addSlicer()">+ Add Slicer</button>`;

  }else if(tab==='validations'){
    const cfv=report.cross_field_validations||[];
    let html='<div class="section"><div class="section-title">Cross-Field Validations</div>';
    cfv.forEach((r,i)=>{
      const rule=r.rule||r.field||'';
      const sev=r.severity||r.op||'';
      html+=`<div class="rule-row">
        <input class="inline-inp" value="${String(rule).replace(/"/g,'&quot;')}" style="flex:1" onblur="updateValidation(${i},'rule',this.value)">
        <select class="inline-sel" onchange="updateValidation(${i},'severity',this.value)">
          <option${sev==='error'?' selected':''}>error</option>
          <option${sev==='warning'?' selected':''}>warning</option>
        </select>
        <button onclick="deleteValidation(${i})" style="background:none;border:none;color:#f85149;cursor:pointer;font-size:13px;opacity:0.4" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.4">✕</button>
      </div>`;
    });
    html+=`<button class="add-btn" onclick="addValidation()">+ Add Validation</button></div>`;
    const crv=report.cross_report_validations||[];
    if(crv.length){
      html+='<div class="section"><div class="section-title">Cross-Report Validations</div>';
      crv.forEach(r=>{
        html+=`<div class="rule-row"><span style="color:#8b949e">${r.source_col||''} → ${r.target_report||''}.${r.target_col||''}</span> <span class="tag">${r.severity||''}</span></div>`;
      });
      html+='</div>';
    }
    tc.innerHTML=html;

  }else if(tab==='config'){
    const gb=report.group_by||(report.aggregation_levels?report.aggregation_levels[0]?.group_by:[])||[];
    const sb=report.sort_by||[];
    const ck=report.composite_key||[];
    const ff=report.fixed_filters||[];
    const dedup=report.deduplication||{};
    let html='<div class="section">';
    html+=`<div class="section-title">Composite Key</div><div style="font-size:12px;color:#c9d1d9;margin-bottom:16px">${ck.join(' + ')||'Not defined'}</div>`;
    html+=`<div class="section-title">Fixed Filters</div>`;
    ff.forEach(f=>{html+=`<div style="font-size:12px;padding:2px 0;color:#c9d1d9"><code style="background:#0d1117;padding:2px 6px;border-radius:3px;font-size:11px">${f}</code></div>`});
    html+=`<div class="section-title" style="margin-top:16px">Deduplication</div>`;
    if(dedup.method){
      html+=`<div style="font-size:12px;color:#c9d1d9">${dedup.method} OVER (${(dedup.partition_by||[]).join(', ')}) WHERE ${dedup.filter||''}</div>`;
    }else{html+=`<div style="font-size:12px;color:#484f58">Not defined</div>`}
    html+=`<div class="section-title" style="margin-top:16px">Sort By</div>`;
    sb.forEach(s=>{html+=`<div style="font-size:12px;color:#c9d1d9">${s.column} ${s.direction}</div>`});
    html+=`<div class="section-title" style="margin-top:16px">Base Table</div><div style="font-size:12px;color:#c9d1d9">${report.base_table||'—'}</div>`;
    html+='</div>';
    tc.innerHTML=html;
  }
}

// Auto-save fields on blur/change
document.addEventListener('change',e=>{if(e.target.classList.contains('f-edit'))saveFields()});
document.addEventListener('blur',e=>{if(e.target.classList.contains('f-edit'))saveFields()},true);
document.addEventListener('change',e=>{if(e.target.classList.contains('sl-edit'))saveSlicers()});
document.addEventListener('blur',e=>{if(e.target.classList.contains('sl-edit'))saveSlicers()},true);

function saveFields(){
  const rows=document.querySelectorAll('tr[data-idx]');
  const fields=[];
  rows.forEach(row=>{
    const f={};
    row.querySelectorAll('.inline-inp.f-edit,.inline-sel.f-edit').forEach(el=>{f[el.dataset.field]=el.value});
    row.querySelectorAll('input[type=checkbox].f-edit').forEach(el=>{f[el.dataset.field]=el.checked});
    if(f.display_name)fields.push(f);
  });
  report.fields=fields;
  fetch(API+'/api/reports/'+reportId+'/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({report_id:reportId,updates:{fields}})});
}

function saveSlicers(){
  const rows=document.querySelectorAll('.sl-edit');
  const slicers={};
  rows.forEach(el=>{
    const i=el.dataset.idx;
    if(!slicers[i])slicers[i]={...report.slicers[i]};
    if(el.type==='checkbox')slicers[i][el.dataset.field]=el.checked;
    else slicers[i][el.dataset.field]=el.value;
  });
  report.slicers=Object.values(slicers);
  fetch(API+'/api/reports/'+reportId+'/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({report_id:reportId,updates:{slicers:report.slicers}})});
}

function addField(){
  report.fields.push({display_name:'',template_ref:'',data_type:'String',allow_null:true,is_aggregate:false});
  switchTab('fields');
}

function deleteField(idx){
  report.fields.splice(idx,1);
  saveFieldsFull();
  switchTab('fields');
}

function addSlicer(){
  report.slicers.push({name:'',required:false});
  switchTab('slicers');
}

function deleteSlicer(idx){
  report.slicers.splice(idx,1);
  fetch(API+'/api/reports/'+reportId+'/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({report_id:reportId,updates:{slicers:report.slicers}})});
  switchTab('slicers');
}

function saveFieldsFull(){
  fetch(API+'/api/reports/'+reportId+'/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({report_id:reportId,updates:{fields:report.fields}})});
}

function updateValidation(idx,field,val){
  report.cross_field_validations[idx][field]=val;
  fetch(API+'/api/reports/'+reportId+'/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({report_id:reportId,updates:{cross_field_validations:report.cross_field_validations}})});
}

function deleteValidation(idx){
  report.cross_field_validations.splice(idx,1);
  fetch(API+'/api/reports/'+reportId+'/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({report_id:reportId,updates:{cross_field_validations:report.cross_field_validations}})});
  switchTab('validations');
}

function addValidation(){
  if(!report.cross_field_validations)report.cross_field_validations=[];
  report.cross_field_validations.push({rule:'',severity:'error'});
  switchTab('validations');
}

function genSQL(){
  location='07-generate-sql.html?id='+reportId;
}

async function sendChat(){
  const inp=document.getElementById('chat-inp');
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  document.getElementById('chat-response').textContent='thinking...';
  const d=await fetch(API+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg+' for report '+reportId})}).then(r=>r.json());
  document.getElementById('chat-response').textContent=d.response||'';
  // Refresh report data
  const resp=await fetch(API+'/api/reports/'+reportId);
  report=await resp.json();
  switchTab('fields');
}

init();
</script>
</body>
</html>
