<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI1X Auditor - Terminal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono','Fira Code','Cascadia Code',monospace;background:#0a0e14;color:#c9d1d9;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.sidebar-logo{padding:20px;font-size:18px;font-weight:700;color:#58a6ff;border-bottom:1px solid #30363d}
.sidebar-nav{flex:1;padding:12px;overflow-y:auto}
.nav-section{margin-bottom:20px}
.nav-section-title{font-size:11px;text-transform:uppercase;color:#8b949e;padding:8px 12px;letter-spacing:.5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;color:#c9d1d9;cursor:pointer;font-size:13px;transition:all .15s;text-decoration:none}
.nav-item:hover{background:#1f2937}
.nav-item.active{background:#1f6feb22;color:#58a6ff}
.sidebar-footer{padding:16px;border-top:1px solid #30363d}
.schema-status{display:flex;align-items:center;gap:8px;font-size:12px;color:#8b949e}
.status-dot{width:8px;height:8px;border-radius:50%;background:#3fb950}
.main{margin-left:260px;display:flex;flex-direction:column;height:100vh}
.term-header{padding:10px 20px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:12px;font-family:-apple-system,sans-serif}
.term-dots{display:flex;gap:6px}
.term-dots span{width:12px;height:12px;border-radius:50%}
.term-dots .r{background:#f85149}.term-dots .y{background:#d29922}.term-dots .g{background:#3fb950}
.term-title{font-size:13px;color:#8b949e;flex:1;text-align:center}
.term-body{flex:1;overflow-y:auto;padding:16px 20px;font-size:13px;line-height:1.7}
.term-body::-webkit-scrollbar{width:6px}
.term-body::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
.line{margin-bottom:2px;white-space:pre-wrap;word-break:break-word}
.line .prompt{color:#58a6ff;font-weight:bold}
.line .cmd{color:#e1e4e8}
.line .ok{color:#3fb950}
.line .err{color:#f85149}
.line .warn{color:#d29922}
.line .dim{color:#484f58}
.line .cyan{color:#58a6ff}
.line .mag{color:#a371f7}
.line .bold{font-weight:bold;color:#e1e4e8}
.tbl{margin:4px 0 8px;border-collapse:collapse}
.tbl td,.tbl th{padding:2px 12px 2px 0;text-align:left;font-size:12px}
.tbl th{color:#8b949e;border-bottom:1px solid #30363d}
.tbl td{color:#c9d1d9}
.input-row{display:flex;align-items:center;padding:8px 20px;background:#0d1117;border-top:1px solid #30363d}
.input-row .prompt{color:#58a6ff;font-weight:bold;margin-right:8px;font-size:13px}
#inp{flex:1;background:transparent;border:none;color:#e1e4e8;font-family:inherit;font-size:13px;outline:none;caret-color:#58a6ff}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">🔷 AI1X Auditor</div>
  <div class="sidebar-nav">
    <div class="nav-section"><div class="nav-section-title">Main</div>
      <div class="nav-item" onclick="location='05-home-loaded.html'">🏠 Home</div>
      <div class="nav-item" onclick="location='02-connect.html'">⚙️ Settings</div>
      <div class="nav-item" onclick="location='15-skills-library.html'">🔧 Skills Library</div></div>
    <div class="nav-section"><div class="nav-section-title">Generate</div>
      <div class="nav-item active" onclick="location='06-ai-chat.html'">🖥️ AI1X CLI</div>
      <div class="nav-item" onclick="location='08-reports.html'">📄 Reports</div>
      <div class="nav-item" onclick="location='07-generate-sql.html'">🛢️ Generate SQL</div>
      <div class="nav-item" onclick="location='10-compare.html'">⚖️ Compare</div>
      <div class="nav-item" onclick="location='14-run-history.html'">📜 Run History</div></div>
    <div class="nav-section"><div class="nav-section-title">Info</div>
      <div class="nav-item" onclick="location='17-user-guide.html'">📖 User Guide</div></div>
  </div>
  <div class="sidebar-footer"><div class="schema-status"><span class="status-dot"></span> HEDIS_RDW</div></div>
</div>
<div class="main">
  <div class="term-header">
    <div class="term-dots"><span class="r"></span><span class="y"></span><span class="g"></span></div>
    <div class="term-title">AI1X — HEDIS_RDW</div>
  </div>
  <div class="term-body" id="out"></div>
  <div class="input-row"><span class="prompt">❯</span><input id="inp" autofocus spellcheck="false" placeholder="Type a command or message..."></div>
</div>
<script src="terminal.js"></script>
</body>
</html>
