<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI1X Auditor - Schema Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column}
.sidebar-logo{padding:20px;font-size:18px;font-weight:700;color:#58a6ff;border-bottom:1px solid #30363d}
.sidebar-nav{flex:1;padding:12px}
.nav-section{margin-bottom:20px}
.nav-section-title{font-size:11px;text-transform:uppercase;color:#8b949e;padding:8px 12px;letter-spacing:.5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:#c9d1d9;cursor:pointer;font-size:14px;transition:all .15s}
.nav-item:hover{background:#1f2937}
.nav-item.active{background:#1f6feb22;color:#58a6ff}
.sidebar-footer{padding:16px;border-top:1px solid #30363d}
.schema-status{display:flex;align-items:center;gap:8px;font-size:12px;color:#8b949e}
.status-dot{width:8px;height:8px;border-radius:50%;background:#3fb950}
.main{margin-left:260px;padding:32px 40px}
.page-header{margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.page-header-left h1{font-size:28px;font-weight:600;margin-bottom:8px}
.page-header-left p{color:#8b949e;font-size:15px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.st{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px;text-align:center}
.st-val{font-size:24px;font-weight:700;color:#58a6ff}
.st-label{font-size:11px;color:#8b949e;margin-top:4px}
.inp{background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e1e4e8;font-size:13px;padding:8px 12px}
.tbl{width:100%;border-collapse:collapse;background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden}
.tbl th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;color:#8b949e;border-bottom:1px solid #30363d;background:#0d1117}
.tbl td{padding:10px 14px;border-bottom:1px solid #21262d;font-size:13px}
.tbl tbody tr{cursor:pointer;transition:background .15s}
.tbl tbody tr:hover{background:#1f293744}
.type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.type-badge.fact{background:#1f6feb22;color:#58a6ff}
.type-badge.dimension{background:#3fb95022;color:#3fb950}
.type-badge.lookup{background:#a371f722;color:#a371f7}
.detail{background:#161b22;border:1px solid #30363d;border-radius:12px;margin-top:16px;overflow:hidden;display:none}
.detail.show{display:block}
.detail-header{padding:16px 20px;border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between}
.detail-header h3{font-size:16px;font-weight:600}
.col-tbl{width:100%;border-collapse:collapse}
.col-tbl th{text-align:left;padding:8px 14px;font-size:10px;text-transform:uppercase;color:#484f58;border-bottom:1px solid #30363d;background:#0d1117}
.col-tbl td{padding:7px 14px;border-bottom:1px solid #21262d;font-size:12px}
.desc-box{padding:16px 20px;font-size:13px;color:#8b949e;line-height:1.6;border-bottom:1px solid #21262d}
.problem{padding:10px 20px;border-bottom:1px solid #21262d;font-size:12px}
.problem-title{color:#d29922;font-weight:600}
.problem-text{color:#8b949e;margin-top:2px}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">🔷 AI1X Auditor</div>
  <div class="sidebar-nav">
    <div class="nav-section"><div class="nav-section-title">Main</div>
      <div class="nav-item" onclick="location='05-home-loaded.html'">🏠 Home</div>
      <div class="nav-item active">🗄️ Schema</div>
      <div class="nav-item" onclick="location='15-skills-library.html'">🔧 Skills Library</div></div>
    <div class="nav-section"><div class="nav-section-title">Generate</div>
      <div class="nav-item" onclick="location='06-ai-chat.html'">💬 AI Chat</div>
      <div class="nav-item" onclick="location='08-reports.html'">📄 Reports</div>
      <div class="nav-item" onclick="location='07-generate-sql.html'">⌨️ SQL Output</div>
      <div class="nav-item" onclick="location='10-compare.html'">🔍 Compare</div>
      <div class="nav-item" onclick="location='14-run-history.html'">📜 Run History</div></div>
  </div>
  <div class="nav-section"><div class="nav-section-title">Info</div><div class="nav-item" onclick="location='17-about.html'">ℹ️ About</div></div></div><div class="sidebar-footer"><div class="schema-status"><span class="status-dot"></span> HEDIS_RDW</div></div>
</div>
<div class="main">
  <div class="page-header">
    <div class="page-header-left"><h1>Schema Explorer</h1><p>HEDIS_RDW — browsing cached schema metadata</p></div>
  </div>
  <div class="stats" id="stats"></div>
  <div style="margin-bottom:12px"><input class="inp" placeholder="Filter tables..." style="width:300px" id="filter" oninput="renderTables()"></div>
  <table class="tbl"><thead><tr><th>Table</th><th>Type</th><th>Columns</th><th>Rows</th></tr></thead><tbody id="tbody"></tbody></table>
  <div class="detail" id="detail">
    <div class="detail-header"><h3 id="detail-title"></h3><button onclick="document.getElementById('detail').classList.remove('show')" style="background:none;border:none;color:#8b949e;cursor:pointer;font-size:16px">✕</button></div>
    <div id="detail-desc"></div>
    <div id="detail-problems"></div>
    <div id="detail-cols"></div>
  </div>
</div>
<script>
const API='http://localhost:8000';
let tables=[];

async function init(){
  const resp=await fetch(API+'/api/schema');
  const data=await resp.json();
  tables=data.tables;
  const totalCols=tables.reduce((s,t)=>s+t.columns_count,0);
  document.getElementById('stats').innerHTML=`
    <div class="st"><div class="st-val">${data.total}</div><div class="st-label">Tables</div></div>
    <div class="st"><div class="st-val">${totalCols}</div><div class="st-label">Columns</div></div>
    <div class="st"><div class="st-val">${tables.filter(t=>t.classification==='fact').length}</div><div class="st-label">Fact Tables</div></div>
    <div class="st"><div class="st-val">${tables.filter(t=>t.classification==='dimension').length}</div><div class="st-label">Dimensions</div></div>`;
  renderTables();
}

function renderTables(){
  const q=(document.getElementById('filter').value||'').toLowerCase();
  const filtered=tables.filter(t=>!q||t.table_name.toLowerCase().includes(q));
  document.getElementById('tbody').innerHTML=filtered.map(t=>`<tr onclick="showDetail('${t.table_name}')">
    <td style="font-weight:600">${t.table_name}</td>
    <td><span class="type-badge ${t.classification}">${t.classification.toUpperCase()}</span></td>
    <td>${t.columns_count}</td>
    <td>${t.row_count||'—'}</td>
  </tr>`).join('');
}

async function showDetail(name){
  const resp=await fetch(API+'/api/schema/'+name);
  const t=await resp.json();
  if(t.error)return;
  document.getElementById('detail').classList.add('show');
  document.getElementById('detail-title').textContent=`${name} — ${Object.keys(t.columns||{}).length} columns`;
  document.getElementById('detail-desc').innerHTML=`<div class="desc-box">${t.description||''}</div>`;
  // Problems
  const probs=(t.problems_and_suggestions||[]);
  document.getElementById('detail-problems').innerHTML=probs.map(p=>`<div class="problem"><div class="problem-title">⚠ ${p.problem}</div><div class="problem-text">💡 ${p.suggestion}</div></div>`).join('');
  // Columns
  const cols=t.columns||{};
  const rows=Object.entries(cols).map(([name,c],i)=>`<tr>
    <td style="color:#484f58">${i+1}</td>
    <td style="font-weight:500;${c.pk?'color:#d29922':''}">${name}</td>
    <td><code style="font-size:11px;background:#0d1117;padding:2px 6px;border-radius:4px">${c.data_type||'—'}</code></td>
    <td>${c.nullable===false?'<span style="color:#f85149">✕</span>':'<span style="color:#3fb950">✓</span>'}</td>
    <td style="font-size:11px;color:${c.pk?'#d29922':c.fk?'#a371f7':'#484f58'}">${c.pk?'PK':c.fk||'—'}</td>
    <td style="font-size:11px;color:#8b949e;max-width:300px">${(c.record_level_info||c.grain||'').substring(0,100)}</td>
  </tr>`).join('');
  document.getElementById('detail-cols').innerHTML=`<table class="col-tbl"><thead><tr><th>#</th><th>Column</th><th>Type</th><th>Null</th><th>Key</th><th>Info</th></tr></thead><tbody>${rows}</tbody></table>`;
  document.getElementById('detail').scrollIntoView({behavior:'smooth'});
}

init();
</script>
</body>
</html>
